<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감독교사 출석 스캐너</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f8e9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #333; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 30px rgba(85, 139, 47, 0.1); width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        h1 { font-size: 1.4em; color: #2e7d32; margin-bottom: 20px; word-break: keep-all; }
        input[type="text"], input[type="password"] { width: 100%; padding: 15px; font-size: 1.1em; border: 2px solid #c8e6c9; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        .btn { background-color: #4caf50; color: white; border: none; padding: 15px; font-size: 1.1em; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-camera { background-color: #1976d2; margin-bottom: 15px; }
        .stats-box { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; font-size: 1.05em; line-height: 1.6; border: 1px solid #c8e6c9; }
        .highlight { color: #c62828; font-weight: bold; }
        /* 커스텀 카메라 영역 */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin: 0 auto; display: none; }
    </style>
</head>
<body>

    <div class="card" id="auth-screen">
        <h1>🔐 감독교사 인증</h1>
        <input type="text" id="teacher-name" placeholder="감독교사 성함 입력">
        <input type="password" id="shared-pw" placeholder="공동 비밀번호 입력">
        <button class="btn" onclick="loginTeacher()">인증 완료</button>
    </div>

    <div class="card" id="scan-screen" style="display: none;">
        <h1>📷 출석 스캐너 (한글 UI)</h1>
        <p style="color: #666; font-size: 0.9em; margin-bottom: 20px;">학생의 QR코드를 비춰주세요.</p>
        
        <button class="btn btn-camera" id="start-btn" onclick="startScanner()">🚀 카메라 켜기 (스캔 시작)</button>
        <div id="reader"></div>
        
        <div id="result-box" style="display: none; margin-top: 20px;">
            <h2 id="result-msg" style="color: #2e7d32; margin-bottom: 10px;">-</h2>
            <div class="stats-box" id="stats-content">데이터 대기 중...</div>
        </div>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const SHARED_PASSWORD = "1234"; 
        const API_URL = "https://script.google.com/macros/s/AKfycbzjDSKEEcwfST6HRxOsQdARUOvhdM8VWUeqTetrcoIDV8_IvrTRHJkgJl9BvLuhd78l/exec";
        
        let html5QrCode;
        let isScanning = false;

        function loginTeacher() {
            const tName = document.getElementById('teacher-name').value;
            const tPw = document.getElementById('shared-pw').value;
            if(!tName) return alert("교사 성함을 입력해주세요.");
            if(tPw !== SHARED_PASSWORD) return alert("공동 비밀번호가 틀렸습니다.");

            sessionStorage.setItem('teacherName', tName);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('scan-screen').style.display = 'block';
        }

        // ✨ 핵심: 영어 메뉴를 없애고 후면 카메라를 강제(environment) 구동하는 코드
        function startScanner() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess,
                (errorMessage) => { /* 무시 */ }
            ).catch(err => {
                alert("카메라 권한을 허용해주세요!");
                document.getElementById('start-btn').style.display = 'block';
            });
            isScanning = true;
        }

        function onScanSuccess(decodedText) {
            if (!isScanning) return; 
            isScanning = false; 
            document.getElementById('beep').play().catch(e => {});
            
            let studentId = decodedText.includes('?id=') ? decodedText.split('?id=')[1] : decodedText;
            processAttendance(studentId);
        }

        async function processAttendance(studentId) {
            const tName = sessionStorage.getItem('teacherName');
            const resultBox = document.getElementById('result-box');
            const resultMsg = document.getElementById('result-msg');
            const statsContent = document.getElementById('stats-content');

            resultBox.style.display = 'block'; resultMsg.style.color = '#f57c00';
            resultMsg.innerText = "⏳ 출석 처리 중...";
            statsContent.innerHTML = "데이터 동기화 중...";

            try {
                const response = await fetch(`${API_URL}?action=attend&id=${studentId}&teacher=${encodeURIComponent(tName)}`);
                const result = await response.json();

                resultMsg.style.color = result.success ? '#2e7d32' : '#c62828';
                resultMsg.innerText = (result.success ? "✅ " : "⚠️ ") + result.message;

                if(result.stats) {
                    statsContent.innerHTML = `
                        <strong>📅 오늘(${result.stats.period}) 통계 현황</strong><br>
                        • 현재 출석: <span style="color:#2e7d32; font-weight:bold;">${result.stats.present}명</span> / ${result.stats.total}명<br>
                        <div style="margin-top:10px; font-size:0.9em; color:#666;">
                            [결석자 명단]<br>${result.stats.absentNames}
                        </div>`;
                }
            } catch (error) {
                resultMsg.innerText = "❌ 서버 접속 실패";
            }
            setTimeout(() => { isScanning = true; }, 2000); // 2초 후 락 해제
        }
    </script>
</body>
</html>
