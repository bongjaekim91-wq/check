<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>출결 스캔</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 840px;
      margin: 0 auto;
      padding: 20px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      font: inherit;
    }

    input,
    select,
    textarea {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      background: var(--primary);
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: #f8fafc;
    }

    button.danger {
      background: var(--danger);
    }

    button.danger:hover {
      background: #b91c1c;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #000;
    }

    .scanner-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: #f1f5f9;
      color: var(--text);
      min-height: 54px;
      line-height: 1.5;
      word-break: break-word;
    }

    .result.success {
      background: #dcfce7;
      color: #166534;
    }

    .result.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .result.warn {
      background: #fef3c7;
      color: #92400e;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 720px) {
      .row {
        grid-template-columns: 1fr 1fr;
      }

      .grid.scan-layout {
        grid-template-columns: 1.1fr 0.9fr;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="top">
      <h1>출결 스캔</h1>
      <a href="<?= appUrl ?>?page=index">홈</a>
    </div>

    <div class="grid scan-layout">
      <section class="card">
        <h2 style="margin-top:0;">카메라 스캔</h2>
        <p class="muted">
          QR 코드 또는 바코드에 학생 ID가 들어있어야 합니다.
          예: <strong>S001</strong> 또는 <strong>https://example.com?id=S001</strong>
        </p>

        <div id="reader"></div>

        <div class="scanner-actions">
          <button id="btnStart" type="button" onclick="startScanner()">
            스캔 시작
          </button>
          <button id="btnStop" class="danger" type="button" onclick="stopScanner()" disabled>
            스캔 중지
          </button>
        </div>

        <div id="scanResult" class="result">
          스캔 대기 중입니다.
        </div>
      </section>

      <section class="card">
        <h2 style="margin-top:0;">수동 입력</h2>

        <div class="row">
          <div>
            <label for="status">출결 상태</label>
            <select id="status">
              <option value="IN">입실 / 등원</option>
              <option value="OUT">퇴실 / 하원</option>
            </select>
          </div>

          <div>
            <label for="deviceId">기기 ID</label>
            <input id="deviceId" type="text" placeholder="예: front-gate">
          </div>
        </div>

        <div style="margin-top:12px;">
          <label for="studentId">학생 ID</label>
          <input id="studentId" type="text" placeholder="예: S001" autocomplete="off">
        </div>

        <div style="margin-top:12px;">
          <label for="note">메모</label>
          <textarea id="note" placeholder="선택 입력"></textarea>
        </div>

        <div style="margin-top:14px;">
          <button id="btnRecord" type="button" onclick="recordManual()">
            출결 기록
          </button>
        </div>

        <div id="manualResult" class="result">
          학생 ID를 입력하거나 스캔하세요.
        </div>
      </section>
    </div>
  </main>

  <script>
    let html5QrCode = null;
    let scannerRunning = false;
    let lastScanText = '';
    let lastScanAt = 0;

    document.addEventListener('DOMContentLoaded', () => {
      const savedDeviceId = localStorage.getItem('attendance_device_id') || '';
      document.getElementById('deviceId').value = savedDeviceId;
    });

    function startScanner() {
      if (scannerRunning) {
        return;
      }

      setScanResult('카메라 권한을 확인하는 중입니다...', '');

      html5QrCode = new Html5Qrcode('reader');

      const config = {
        fps: 10,
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
          const size = Math.floor(minEdge * 0.7);
          return {
            width: size,
            height: size
          };
        },
        rememberLastUsedCamera: true,
        supportedScanTypes: [
          Html5QrcodeScanType.SCAN_TYPE_CAMERA
        ]
      };

      html5QrCode.start(
        { facingMode: 'environment' },
        config,
        onScanSuccess,
        onScanFailure
      ).then(() => {
        scannerRunning = true;
        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;
        setScanResult('스캔 중입니다. QR 또는 바코드를 카메라에 비춰주세요.', '');
      }).catch(err => {
        setScanResult('카메라 시작 실패: ' + err, 'error');
      });
    }

    function stopScanner() {
      if (!html5QrCode || !scannerRunning) {
        return;
      }

      html5QrCode.stop().then(() => {
        scannerRunning = false;
        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStop').disabled = true;
        setScanResult('스캔이 중지되었습니다.', 'warn');
      }).catch(err => {
        setScanResult('스캔 중지 실패: ' + err, 'error');
      });
    }

    function onScanSuccess(decodedText) {
      const now = Date.now();

      // 동일 코드 연속 인식 방지
      if (decodedText === lastScanText && now - lastScanAt < 2500) {
        return;
      }

      lastScanText = decodedText;
      lastScanAt = now;

      const studentId = extractStudentId(decodedText);

      if (!studentId) {
        setScanResult('학생 ID를 추출할 수 없습니다: ' + decodedText, 'error');
        return;
      }

      document.getElementById('studentId').value = studentId;
      setScanResult('스캔 성공: ' + studentId + ' / 기록 중...', '');

      recordAttendance(studentId, 'scan');
    }

    function onScanFailure(error) {
      // 스캔 실패 이벤트는 매우 자주 발생하므로 화면에 표시하지 않음
    }

    function recordManual() {
      const studentId = document.getElementById('studentId').value.trim();

      if (!studentId) {
        setManualResult('학생 ID를 입력하세요.', 'error');
        return;
      }

      recordAttendance(studentId, 'manual');
    }

    function recordAttendance(studentId, source) {
      const status = document.getElementById('status').value;
      const note = document.getElementById('note').value.trim();
      const deviceId = document.getElementById('deviceId').value.trim();

      localStorage.setItem('attendance_device_id', deviceId);

      document.getElementById('btnRecord').disabled = true;

      google.script.run
        .withSuccessHandler(res => {
          document.getElementById('btnRecord').disabled = false;

          if (!res || !res.ok) {
            const message = res && res.error ? res.error : '기록 실패';
            setManualResult(message, 'error');
            setScanResult(message, 'error');
            return;
          }

          const data = res.data || {};
          const duplicateText = res.duplicate ? '중복 처리됨' : '기록 완료';

          const message =
            '[' + duplicateText + '] ' +
            (data.timestamp || '') + '<br>' +
            escapeHtml(data.studentId || studentId) + ' / ' +
            escapeHtml(data.studentName || '') + ' / ' +
            escapeHtml(data.className || '') + ' / ' +
            escapeHtml(data.status || status);

          const css = res.duplicate ? 'warn' : 'success';

          setManualResult(message, css);
          setScanResult(message, css);
        })
        .withFailureHandler(err => {
          document.getElementById('btnRecord').disabled = false;

          const message = '서버 오류: ' + err;
          setManualResult(message, 'error');
          setScanResult(message, 'error');
        })
        .recordAttendance({
          studentId: studentId,
          status: status,
          source: source,
          note: note,
          deviceId: deviceId
        });
    }

    function extractStudentId(text) {
      text = String(text || '').trim();

      if (!text) {
        return '';
      }

      // URL 형태인 경우 id, studentId 파라미터 우선 추출
      try {
        const url = new URL(text);
        const byStudentId = url.searchParams.get('studentId');
        const byId = url.searchParams.get('id');

        if (byStudentId) {
          return byStudentId.trim();
        }

        if (byId) {
          return byId.trim();
        }
      } catch (ignore) {}

      // JSON 형태인 경우
      try {
        const obj = JSON.parse(text);

        if (obj.studentId) {
          return String(obj.studentId).trim();
        }

        if (obj.id) {
          return String(obj.id).trim();
        }
      } catch (ignore) {}

      // 기본값: 스캔 텍스트 자체를 ID로 사용
      return text;
    }

    function setScanResult(message, type) {
      setResult('scanResult', message, type);
    }

    function setManualResult(message, type) {
      setResult('manualResult', message, type);
    }

    function setResult(id, message, type) {
      const el = document.getElementById(id);
      el.className = 'result';

      if (type) {
        el.classList.add(type);
      }

      el.innerHTML = message;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
