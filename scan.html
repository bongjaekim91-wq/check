<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석 스캐너</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f8e9; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .card { background: white; padding: 40px 20px; border-radius: 20px; box-shadow: 0 8px 30px rgba(85, 139, 47, 0.1); width: 90%; max-width: 400px; }
        .icon { font-size: 4em; margin-bottom: 20px; }
        h1 { font-size: 1.5em; margin-bottom: 10px; color: #333; word-break: keep-all; line-height: 1.4; }
        p { color: #666; font-size: 1em; }
        .success { color: #2e7d32; }
        .error { color: #c62828; }
    </style>
</head>
<body>
    <div class="card" id="result-card">
        <div class="icon">⏳</div>
        <h1>출석 정보를 확인하고 있습니다...</h1>
        <p>잠시만 기다려주세요.</p>
    </div>

    <script>
        // 🚨 선생님의 구글 스크립트 주소를 여기에 넣어주세요!
        const API_URL = "https://script.google.com/macros/s/AKfycbzjDSKEEcwfST6HRxOsQdARUOvhdM8VWUeqTetrcoIDV8_IvrTRHJkgJl9BvLuhd78l/exec";

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const studentId = urlParams.get('id');
            const card = document.getElementById('result-card');

            if (!studentId) {
                card.innerHTML = `<div class="icon error">⚠️</div><h1 class="error">잘못된 접근입니다.</h1><p>QR 코드를 다시 스캔해주세요.</p>`;
                return;
            }

            try {
                // 깃허브 화면이 백그라운드에서 구글 시트로 출석 데이터를 조용히 넘깁니다.
                const response = await fetch(`${API_URL}?action=attend&id=${studentId}`);
                const result = await response.json();

                if (result.success) {
                    card.innerHTML = `<div class="icon success">✅</div><h1 class="success">${result.message}</h1><p>${new Date().toLocaleTimeString('ko-KR')}</p>`;
                } else {
                    card.innerHTML = `<div class="icon error">⚠️</div><h1 class="error">${result.message}</h1><p>시간을 다시 확인해주세요.</p>`;
                }
            } catch (error) {
                card.innerHTML = `<div class="icon error">❌</div><h1 class="error">서버 접속 실패</h1><p>일시적인 오류입니다. 다시 시도해주세요.</p>`;
            }
        };
    </script>
</body>
</html>
