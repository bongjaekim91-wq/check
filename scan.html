<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서현고등학교 꿈꾸는 글마루 출석 스캐너</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family:'Noto Sans KR',sans-serif;
      background:#f1f8e9;
      margin:0;
      padding:20px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      color:#333;
      box-sizing:border-box;
    }
    .card {
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 8px 30px rgba(85,139,47,.1);
      width:100%;
      max-width:420px;
      text-align:center;
      margin-bottom:20px;
      box-sizing:border-box;
    }
    h1 {
      font-size:1.4em;
      color:#2e7d32;
      margin-bottom:20px;
      word-break:keep-all;
      line-height:1.4;
    }
    input[type="text"],
    input[type="password"],
    select {
      width:100%;
      padding:15px;
      font-size:1.05em;
      border:2px solid #c8e6c9;
      border-radius:10px;
      margin-bottom:12px;
      box-sizing:border-box;
      text-align:center;
      font-family:inherit;
    }
    .btn {
      background:#4caf50;
      color:white;
      border:none;
      padding:15px;
      font-size:1.05em;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      width:100%;
      margin-top:10px;
      transition:.2s;
      font-family:inherit;
    }
    .btn-outline {
      background:white;
      border:2px solid #4caf50;
      color:#2e7d32;
    }
    .btn-camera {
      background:#1976d2;
      margin-bottom:15px;
    }
    .btn-extra {
      background:#6a1b9a;
    }
    .notice {
      background:#fffde7;
      border:1px solid #fff59d;
      color:#795548;
      padding:12px;
      border-radius:10px;
      font-size:.92em;
      line-height:1.5;
      margin-bottom:15px;
    }
    .stats-box {
      background:#e8f5e9;
      padding:15px;
      border-radius:10px;
      margin-top:20px;
      text-align:left;
      font-size:1.05em;
      line-height:1.6;
      border:1px solid #c8e6c9;
    }
    #reader {
      width:100%;
      border-radius:15px;
      overflow:hidden;
      margin:0 auto;
      display:none;
      margin-bottom: 15px;
    }
    .period-selector {
      background:#e8f5e9;
      padding:15px;
      border-radius:10px;
      margin-bottom:20px;
      border:2px solid #4caf50;
    }
    .extra-panel {
      display:none;
      background:#f3e5f5;
      padding:15px;
      border-radius:10px;
      margin-top:15px;
      border:1px solid #ce93d8;
      text-align:left;
    }
    .extra-panel h3 {
      margin:0 0 10px 0;
      color:#6a1b9a;
      text-align:center;
    }
    .footer {
      margin-top:10px;
      font-size:.85em;
      color:#7f8c8d;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="card" id="auth-screen">
    <h1>🔐 서현고등학교 꿈꾸는 글마루<br>출석 스캐너 로그인</h1>
    <div class="notice">
      출석 인정 시간 안내<br>
      1교시 18:00~19:40<br>
      2교시 20:00~21:40
    </div>
    <input type="text" id="teacher-name" placeholder="아이디, 감독자 이름 입력" autocomplete="off">
    <input type="password" id="shared-pw" placeholder="비밀번호">
    <button type="button" class="btn" onclick="loginTeacher()">로그인 및 스캔 시작</button>
  </div>
  <div class="card" id="scan-screen" style="display:none;">
    <h1>📷 출석 스캐너</h1>
    <div class="period-selector">
      <p style="margin:0 0 10px 0; color:#2e7d32; font-weight:bold;">✅ 진행할 교시를 선택하세요</p>
      <select id="scan-period" style="font-weight:bold; color:#2e7d32; border-color:#4caf50; background-color:white;">
        <option value="1교시">1교시 출석 처리</option>
        <option value="2교시">2교시 출석 처리</option>
      </select>
    </div>
    <p style="color:#666; font-size:.9em; margin-bottom:15px;">
      학생의 QR코드를 비춰주세요.
    </p>
    <button class="btn btn-camera" id="start-btn" onclick="startScanner()">🚀 카메라 켜기, 스캔 시작</button>
    <div id="reader"></div>
    <button class="btn btn-extra" onclick="toggleExtraPanel()">➕ 학생 수동 추가입력</button>
    <div class="extra-panel" id="extra-panel">
      <h3>학생 수동 출석 입력</h3>
      <div style="font-size:.9em; color:#6a1b9a; text-align:center; margin-bottom:10px;">
        QR이 없는 학생이나 명단 외 학생을 입력합니다.<br>
        (선택된 교시로 처리됩니다)
      </div>
      <input type="text" id="extra-id" placeholder="학번 입력">
      <input type="text" id="extra-name" placeholder="이름 입력, 명단에 있는 학생은 생략 가능">
      <button class="btn btn-extra" onclick="submitExtraAttendance()">추가 출석 처리</button>
    </div>
    <div id="result-box" style="display:none; margin-top:20px;">
      <h2 id="result-msg" style="color:#2e7d32; margin-bottom:10px;">-</h2>
      <div class="stats-box" id="stats-content">데이터 대기 대기 중...</div>
    </div>
    <button class="btn btn-outline" onclick="logoutTeacher()" style="margin-top: 20px;">로그아웃</button>
  </div>
  <div class="footer">
    Copyright 2026. 서현고 교감 김봉재 All Rights Reserved.
  </div>
  <script>
    // ⚠️ 새 버전으로 배포한 최신 앱스 스크립트 웹 앱 URL로 반드시 변경해주세요.
    const API_URL = "https://script.google.com/macros/s/AKfycbzjDSKEEcwfST6HRxOsQdARUOvhdM8VWUeqTetrcoIDV8_IvrTRHJkgJl9BvLuhd78l/exec";
    let html5QrCode = null;
    let isScanning = false;
    
    window.addEventListener("DOMContentLoaded", () => {
      const pwInput = document.getElementById("shared-pw");
      const idInput = document.getElementById("teacher-name");
      if (pwInput) {
        pwInput.addEventListener("keyup", function(event) {
          if (event.key === "Enter") loginTeacher();
        });
      }
      if (idInput) {
        idInput.addEventListener("keyup", function(event) {
          if (event.key === "Enter") loginTeacher();
        });
      }
      const savedTeacherName = sessionStorage.getItem("teacherName");
      if (savedTeacherName) {
        showScanScreen();
        const directId = getIdFromCurrentUrl();
        if (directId) {
          processAttendance(directId);
          history.replaceState(null, "", location.pathname);
        }
      }
    });

    function showScanScreen() {
      document.getElementById("auth-screen").style.display = "none";
      document.getElementById("scan-screen").style.display = "block";
    }

    function loginTeacher() {
      const tName = document.getElementById("teacher-name").value.trim();
      const tPw = document.getElementById("shared-pw").value;
      if (!tName) return alert("아이디, 감독자 이름을 입력해주세요.");
      if (tPw !== "1234") return alert("비밀번호가 틀렸습니다.");
      sessionStorage.setItem("teacherName", tName);
      showScanScreen();
      const directId = getIdFromCurrentUrl();
      if (directId) {
        processAttendance(directId);
        history.replaceState(null, "", location.pathname);
      }
    }

    function logoutTeacher() {
      if (!confirm("로그아웃하시겠습니까?")) return;
      sessionStorage.removeItem("teacherName");
      location.reload();
    }

    function toggleExtraPanel() {
      const panel = document.getElementById("extra-panel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    function startScanner() {
      const selectedPeriod = document.getElementById("scan-period").value;
      if (!selectedPeriod) {
        alert("진행할 교시를 선택해주세요.");
        return;
      }
      document.getElementById("start-btn").style.display = "none";
      document.getElementById("reader").style.display = "block";
      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
      }
      html5QrCode.start(
        { facingMode:"environment" },
        { fps:10, qrbox:{ width:250, height:250 } },
        onScanSuccess,
        () => {}
      ).then(() => {
        isScanning = true;
      }).catch(() => {
        alert("카메라 권한을 허용해주세요.");
        document.getElementById("start-btn").style.display = "block";
        document.getElementById("reader").style.display = "none";
        isScanning = false;
      });
    }

    function onScanSuccess(decodedText) {
      if (!isScanning) return;
      isScanning = false;
      const studentId = extractStudentId(decodedText);
      if (!studentId) {
        showResult(false, "학생 QR을 다시 비춰주세요.", "QR 데이터에서 학생 ID를 찾지 못했습니다.");
        setTimeout(() => isScanning = true, 2000);
        return;
      }
      processAttendance(studentId);
    }

    function extractStudentId(decodedText) {
      const text = String(decodedText || "").trim();
      if (!text) return "";
      try {
        const url = new URL(text);
        const id = url.searchParams.get("id");
        if (id) return id.trim();
      } catch (e) {}
      if (text.includes("?")) {
        try {
          const qs = text.substring(text.indexOf("?") + 1);
          const params = new URLSearchParams(qs);
          const id = params.get("id");
          if (id) return id.trim();
        } catch (e) {}
      }
      return text;
    }

    function getIdFromCurrentUrl() {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      return id ? id.trim() : "";
    }

    function showResult(success, message, detailHtml) {
      const resultBox = document.getElementById("result-box");
      const resultMsg = document.getElementById("result-msg");
      const statsContent = document.getElementById("stats-content");
      resultBox.style.display = "block";
      resultMsg.style.color = success ? "#2e7d32" : "#c62828";
      resultMsg.innerText = message;
      statsContent.innerHTML = detailHtml || "";
    }

    async function processAttendance(studentId) {
      const tName = sessionStorage.getItem("teacherName") || "미상";
      const selectedPeriod = document.getElementById("scan-period").value;
      if (!selectedPeriod) {
        alert("교시가 선택되지 않았습니다.");
        isScanning = true;
        return;
      }
      const resultBox = document.getElementById("result-box");
      const resultMsg = document.getElementById("result-msg");
      const statsContent = document.getElementById("stats-content");
      resultBox.style.display = "block";
      resultMsg.style.color = "#f57c00";
      resultMsg.innerText = `⏳ ${selectedPeriod} 출석 처리 중...`;
      statsContent.innerHTML = "데이터 동기화 중...";
      try {
        const fetchUrl =
          `${API_URL}?action=attend` +
          `&id=${encodeURIComponent(studentId)}` +
          `&teacher=${encodeURIComponent(tName)}` +
          `&period=${encodeURIComponent(selectedPeriod)}` +
          `&t=${Date.now()}`;
        const response = await fetch(fetchUrl);
        const result = await response.json();
        
        // 💡 제외된 학생이거나 해당 요일 대상이 아닐 때 "O교시 출석대상자가 아닙니다." 표시 및 수동 승인 유도
        if (result.code === "NOT_SCHEDULED" || result.code === "EXCLUDED" || (result.message && result.message.includes("제외"))) {
          resultMsg.style.color = "#c62828";
          resultMsg.innerText = `⚠️ ${selectedPeriod} 출석대상자가 아닙니다.`;
          statsContent.innerHTML = `
            <div style="text-align:center; padding: 10px;">
              <p style="color:#c62828; font-weight:bold; margin-bottom: 10px; font-size: 1.1em;">
                ${result.studentName || "해당"}(${studentId}) 학생은 ${selectedPeriod} 출석대상자가 아닙니다.<br>(해당 요일 대상 아님 또는 제외 처리됨)
              </p>
              <p style="font-size: 0.9em; color:#666; margin-bottom: 20px;">
                학생이 출석을 희망할 경우 아래 버튼을 눌러 수동으로 승인할 수 있습니다.
              </p>
              <button class="btn btn-extra" onclick="submitExtraAttendanceDirect('${studentId}', '${result.studentName || '미상'}')">
                👉 수동 출석(추가출석) 승인하기
              </button>
              <button class="btn btn-outline" onclick="cancelManualAdd()" style="margin-top:10px;">
                ❌ 취소하고 다음 학생 스캔하기
              </button>
            </div>
          `;
          return;
        }

        resultMsg.style.color = result.success ? "#2e7d32" : "#c62828";
        resultMsg.innerText = (result.success ? "✅ " : "⚠️ ") + (result.message || "");
        renderStatsBox(result);
      } catch (e) {
        resultMsg.style.color = "#c62828";
        resultMsg.innerText = "❌ 서버 접속 실패";
        statsContent.innerHTML = "네트워크 또는 서버 상태를 확인해주세요.";
      }
      setTimeout(() => {
        isScanning = true;
      }, 2000);
    }

    // 대상 외 학생 또는 제외된 학생을 강제로 '수동 출석' 처리하는 함수
    async function submitExtraAttendanceDirect(id, name) {
      const tName = sessionStorage.getItem("teacherName") || "미상";
      const selectedPeriod = document.getElementById("scan-period").value;
      const resultBox = document.getElementById("result-box");
      const resultMsg = document.getElementById("result-msg");
      const statsContent = document.getElementById("stats-content");
      resultBox.style.display = "block";
      resultMsg.style.color = "#f57c00";
      resultMsg.innerText = `⏳ ${name} 학생 추가 출석 처리 중...`;
      statsContent.innerHTML = "데이터 동기화 중...";
      try {
        const fetchUrl =
          `${API_URL}?action=extraAttend` +
          `&id=${encodeURIComponent(id)}` +
          `&name=${encodeURIComponent(name)}` +
          `&teacher=${encodeURIComponent(tName)}` +
          `&period=${encodeURIComponent(selectedPeriod)}` +
          `&t=${Date.now()}`;
        const response = await fetch(fetchUrl);
        const result = await response.json();
        resultMsg.style.color = result.success ? "#2e7d32" : "#c62828";
        resultMsg.innerText = (result.success ? "✅ 수동 승인 완료: " : "⚠️ ") + (result.message || "");
        renderStatsBox(result);
      } catch (e) {
        resultMsg.style.color = "#c62828";
        resultMsg.innerText = "❌ 서버 접속 실패";
        statsContent.innerHTML = "네트워크 또는 서버 상태를 확인해주세요.";
      }
      setTimeout(() => {
        isScanning = true;
      }, 2000);
    }

    // 수동 승인을 취소하고 다시 스캔 모드로 복귀하는 함수
    function cancelManualAdd() {
      const statsContent = document.getElementById("stats-content");
      const resultMsg = document.getElementById("result-msg");
      resultMsg.style.color = "#666";
      resultMsg.innerText = "취소되었습니다. 다음 학생을 스캔하세요.";
      statsContent.innerHTML = "";
      isScanning = true;
    }

    // 기존의 수동 텍스트 박스 입력 (명단 외 학생 처리용)
    async function submitExtraAttendance() {
      const id = document.getElementById("extra-id").value.trim();
      const name = document.getElementById("extra-name").value.trim();
      const tName = sessionStorage.getItem("teacherName") || "미상";
      const selectedPeriod = document.getElementById("scan-period").value;
      if (!id) {
        alert("학번을 입력해주세요.");
        return;
      }
      if (!selectedPeriod) {
        alert("교시가 선택되지 않았습니다.");
        return;
      }
      const resultBox = document.getElementById("result-box");
      const resultMsg = document.getElementById("result-msg");
      const statsContent = document.getElementById("stats-content");
      resultBox.style.display = "block";
      resultMsg.style.color = "#f57c00";
      resultMsg.innerText = `⏳ ${selectedPeriod} 추가 출석 처리 중...`;
      statsContent.innerHTML = "데이터 동기화 중...";
      try {
        const fetchUrl =
          `${API_URL}?action=extraAttend` +
          `&id=${encodeURIComponent(id)}` +
          `&name=${encodeURIComponent(name)}` +
          `&teacher=${encodeURIComponent(tName)}` +
          `&period=${encodeURIComponent(selectedPeriod)}` +
          `&t=${Date.now()}`;
        const response = await fetch(fetchUrl);
        const result = await response.json();
        resultMsg.style.color = result.success ? "#2e7d32" : "#c62828";
        resultMsg.innerText = (result.success ? "✅ " : "⚠️ ") + (result.message || "");
        renderStatsBox(result);
        if (result.success) {
          document.getElementById("extra-id").value = "";
          document.getElementById("extra-name").value = "";
        }
      } catch (e) {
        resultMsg.style.color = "#c62828";
        resultMsg.innerText = "❌ 서버 접속 실패";
        statsContent.innerHTML = "네트워크 또는 서버 상태를 확인해주세요.";
      }
    }

    function renderStatsBox(result) {
      const statsContent = document.getElementById("stats-content");
      if (result.stats) {
        statsContent.innerHTML = `
          <strong>📅 오늘 ${result.stats.period} 통계</strong><br>
          • 현재 출석:
          <span style="color:#2e7d32; font-weight:bold;">${result.stats.present}명</span>
          / ${result.stats.total}명<br>
          • 결석:
          <span style="color:#c62828; font-weight:bold;">${result.stats.absent}명</span><br>
          • 추가 참석:
          <span style="color:#6a1b9a; font-weight:bold;">${result.stats.extra || 0}명</span>
          <div style="margin-top:10px; font-size:.9em; color:#666;">
            [결석자 명단]<br>${result.stats.absentNames || "-"}
          </div>
        `;
      } else {
        statsContent.innerHTML = "통계 정보가 없습니다.";
      }
    }
  </script>
</body>
</html>
