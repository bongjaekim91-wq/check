<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서현고등학교 꿈꾸는 글마루 출석 스캐너</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family:'Noto Sans KR',sans-serif; background:#f1f8e9; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; color:#333; box-sizing:border-box; }
    .card { background:white; padding:30px; border-radius:20px; box-shadow:0 8px 30px rgba(85,139,47,.1); width:100%; max-width:400px; text-align:center; margin-bottom:20px; box-sizing:border-box; }
    h1 { font-size:1.4em; color:#2e7d32; margin-bottom:20px; word-break:keep-all; line-height:1.4; }
    input[type="text"], input[type="password"] { width:100%; padding:15px; font-size:1.1em; border:2px solid #c8e6c9; border-radius:10px; margin-bottom:15px; box-sizing:border-box; text-align:center; }
    .btn { background:#4caf50; color:white; border:none; padding:15px; font-size:1.1em; border-radius:10px; cursor:pointer; font-weight:bold; width:100%; margin-top:10px; transition:.2s; }
    .btn-outline { background:white; border:2px solid #4caf50; color:#2e7d32; }
    .btn-camera { background:#1976d2; margin-bottom:15px; }
    .notice { background:#fffde7; border:1px solid #fff59d; color:#795548; padding:12px; border-radius:10px; font-size:.92em; line-height:1.5; margin-bottom:15px; }
    .stats-box { background:#e8f5e9; padding:15px; border-radius:10px; margin-top:20px; text-align:left; font-size:1.05em; line-height:1.6; border:1px solid #c8e6c9; }
    #reader { width:100%; border-radius:15px; overflow:hidden; margin:0 auto; display:none; }
    .test-panel { display:none; background:#fff3e0; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid #ffcc80; }
    .test-panel select { width:100%; padding:10px; font-size:1.1em; border-radius:8px; border:1px solid #ff9800; }
    .footer { margin-top:10px; font-size:.85em; color:#7f8c8d; text-align:center; }
  </style>
</head>
<body>
  <div class="card" id="auth-screen">
    <h1>🔐 서현고등학교 꿈꾸는 글마루<br>출석 스캐너 로그인</h1>
    <div class="notice">
      출석 인정 시간<br>
      1교시 18:00~19:40<br>
      2교시 19:41~21:40
    </div>
    <input type="text" id="teacher-name" placeholder="아이디, 감독자 이름 입력" autocomplete="off">
    <input type="password" id="shared-pw" placeholder="비밀번호">
    <button class="btn" onclick="loginTeacher()">로그인 및 스캔 시작</button>
  </div>

  <div class="card" id="scan-screen" style="display:none;">
    <h1>📷 출석 스캐너</h1>
    <div class="notice">
      1교시 18:00~19:40 / 2교시 19:41~21:40
    </div>
    <p style="color:#666; font-size:.9em; margin-bottom:20px;">학생의 QR코드를 비춰주세요.</p>

    <button class="btn btn-outline" id="test-mode-btn" onclick="toggleTestMode()" style="margin-bottom:15px;">
      🛠️ 테스트 모드 켜기, 시간 무시
    </button>

    <div class="test-panel" id="test-panel">
      <p style="margin:0 0 10px 0; color:#e65100; font-weight:bold;">⚠️ 강제로 처리할 교시 선택</p>
      <select id="force-period">
        <option value="1교시">1교시 강제 출석</option>
        <option value="2교시">2교시 강제 출석</option>
      </select>
    </div>

    <button class="btn btn-camera" id="start-btn" onclick="startScanner()">🚀 카메라 켜기, 스캔 시작</button>
    <div id="reader"></div>

    <div id="result-box" style="display:none; margin-top:20px;">
      <h2 id="result-msg" style="color:#2e7d32; margin-bottom:10px;">-</h2>
      <div class="stats-box" id="stats-content">데이터 대기 중...</div>
    </div>

    <button class="btn btn-outline" onclick="logoutTeacher()">로그아웃</button>
  </div>

  <div class="footer">Copyright 2026. 서현고 교감 김봉재 All Rights Reserved.</div>
  <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzjDSKEEcwfST6HRxOsQdARUOvhdM8VWUeqTetrcoIDV8_IvrTRHJkgJl9BvLuhd78l/exec";

    let html5QrCode = null;
    let isScanning = false;
    let isTestMode = false;

    window.addEventListener("load", () => {
      const savedTeacherName = sessionStorage.getItem("teacherName");

      if (savedTeacherName) {
        showScanScreen();

        const directId = getIdFromCurrentUrl();
        if (directId) {
          processAttendance(directId);
          history.replaceState(null, "", location.pathname);
        }
      }
    });

    function showScanScreen() {
      document.getElementById("auth-screen").style.display = "none";
      document.getElementById("scan-screen").style.display = "block";
    }

    function loginTeacher() {
      const tName = document.getElementById("teacher-name").value.trim();
      const tPw = document.getElementById("shared-pw").value;

      if (!tName) return alert("아이디, 감독자 이름을 입력해주세요.");
      if (tPw !== "1234") return alert("비밀번호가 틀렸습니다.");

      sessionStorage.setItem("teacherName", tName);
      showScanScreen();

      const directId = getIdFromCurrentUrl();
      if (directId) {
        processAttendance(directId);
        history.replaceState(null, "", location.pathname);
      }
    }

    function logoutTeacher() {
      if (!confirm("로그아웃하시겠습니까?")) return;
      sessionStorage.removeItem("teacherName");
      location.reload();
    }

    function toggleTestMode() {
      isTestMode = !isTestMode;

      const btn = document.getElementById("test-mode-btn");
      const panel = document.getElementById("test-panel");

      if (isTestMode) {
        btn.innerText = "❌ 테스트 모드 끄기, 정상 작동";
        btn.style.backgroundColor = "#ffebee";
        btn.style.borderColor = "#e57373";
        btn.style.color = "#c62828";
        panel.style.display = "block";
      } else {
        btn.innerText = "🛠️ 테스트 모드 켜기, 시간 무시";
        btn.style.backgroundColor = "white";
        btn.style.borderColor = "#4caf50";
        btn.style.color = "#2e7d32";
        panel.style.display = "none";
      }
    }

    function startScanner() {
      document.getElementById("start-btn").style.display = "none";
      document.getElementById("reader").style.display = "block";

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
      }

      html5QrCode.start(
        { facingMode:"environment" },
        { fps:10, qrbox:{ width:250, height:250 } },
        onScanSuccess,
        () => {}
      ).then(() => {
        isScanning = true;
      }).catch(() => {
        alert("카메라 권한을 허용해주세요.");
        document.getElementById("start-btn").style.display = "block";
        document.getElementById("reader").style.display = "none";
        isScanning = false;
      });
    }

    function onScanSuccess(decodedText) {
      if (!isScanning) return;

      isScanning = false;
      document.getElementById("beep").play().catch(() => {});

      const studentId = extractStudentId(decodedText);

      if (!studentId) {
        showResult(false, "학생 QR을 다시 비춰주세요.", "QR 데이터에서 학생 ID를 찾지 못했습니다.");
        setTimeout(() => isScanning = true, 2000);
        return;
      }

      processAttendance(studentId);
    }

    function extractStudentId(decodedText) {
      const text = String(decodedText || "").trim();
      if (!text) return "";

      try {
        const url = new URL(text);
        const id = url.searchParams.get("id");
        if (id) return id.trim();
      } catch (e) {}

      if (text.includes("?")) {
        try {
          const qs = text.substring(text.indexOf("?") + 1);
          const params = new URLSearchParams(qs);
          const id = params.get("id");
          if (id) return id.trim();
        } catch (e) {}
      }

      return text;
    }

    function getIdFromCurrentUrl() {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      return id ? id.trim() : "";
    }

    function showResult(success, message, detailHtml) {
      const resultBox = document.getElementById("result-box");
      const resultMsg = document.getElementById("result-msg");
      const statsContent = document.getElementById("stats-content");

      resultBox.style.display = "block";
      resultMsg.style.color = success ? "#2e7d32" : "#c62828";
      resultMsg.innerText = message;
      statsContent.innerHTML = detailHtml || "";
    }

    async function processAttendance(studentId) {
      const tName = sessionStorage.getItem("teacherName") || "미상";
      const resultBox = document.getElementById("result-box");
      const resultMsg = document.getElementById("result-msg");
      const statsContent = document.getElementById("stats-content");

      resultBox.style.display = "block";
      resultMsg.style.color = "#f57c00";
      resultMsg.innerText = "⏳ 처리 중...";
      statsContent.innerHTML = "데이터 동기화 중...";

      try {
        let fetchUrl =
          `${API_URL}?action=attend` +
          `&id=${encodeURIComponent(studentId)}` +
          `&teacher=${encodeURIComponent(tName)}`;

        if (isTestMode) {
          const forceP = document.getElementById("force-period").value;
          fetchUrl += `&forcePeriod=${encodeURIComponent(forceP)}`;
        }

        const response = await fetch(fetchUrl);
        const result = await response.json();

        resultMsg.style.color = result.success ? "#2e7d32" : "#c62828";
        resultMsg.innerText = (result.success ? "✅ " : "⚠️ ") + (result.message || "");

        if (result.stats) {
          statsContent.innerHTML = `
            <strong>📅 오늘 ${result.stats.period} 통계</strong><br>
            • 현재 출석:
            <span style="color:#2e7d32; font-weight:bold;">${result.stats.present}명</span>
            / ${result.stats.total}명<br>
            • 결석: <span style="color:#c62828; font-weight:bold;">${result.stats.absent}명</span>
            <div style="margin-top:10px; font-size:.9em; color:#666;">
              [결석자 명단]<br>${result.stats.absentNames || "-"}
            </div>
          `;
        } else {
          statsContent.innerHTML = "통계 정보가 없습니다.";
        }
      } catch (e) {
        resultMsg.style.color = "#c62828";
        resultMsg.innerText = "❌ 서버 접속 실패";
        statsContent.innerHTML = "네트워크 또는 서버 상태를 확인해주세요.";
      }

      setTimeout(() => {
        isScanning = true;
      }, 2000);
    }
  </script>
</body>
</html>
