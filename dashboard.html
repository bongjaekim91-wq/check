<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>출결 대시보드</title>

  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
      margin-bottom: 16px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
    }

    input,
    button {
      width: 100%;
      font: inherit;
    }

    input {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      background: var(--primary);
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: #f8fafc;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .stat .value {
      margin-top: 6px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      background: #fff;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-size: 13px;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .badge.in {
      background: #dcfce7;
      color: #166534;
    }

    .badge.out {
      background: #fee2e2;
      color: #991b1b;
    }

    .empty {
      padding: 36px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: #fff;
    }

    .message {
      padding: 14px;
      border-radius: 14px;
      background: #f1f5f9;
      margin-bottom: 16px;
      color: var(--text);
      line-height: 1.5;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: end;
    }

    @media (min-width: 720px) {
      .filters {
        grid-template-columns: 1fr 1fr 1fr 1.3fr;
        align-items: end;
      }

      .actions {
        grid-template-columns: 1fr 1fr;
      }

      .stats {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="top">
      <h1>출결 대시보드</h1>
      <a href="<?= appUrl ?>?page=index">홈</a>
    </div>

    <section class="card">
      <div class="filters">
        <div>
          <label for="adminPin">관리자 PIN</label>
          <input id="adminPin" type="password" placeholder="기본값 1234">
        </div>

        <div>
          <label for="dateFrom">시작일</label>
          <input id="dateFrom" type="date">
        </div>

        <div>
          <label for="dateTo">종료일</label>
          <input id="dateTo" type="date">
        </div>

        <div>
          <label for="q">검색</label>
          <input id="q" type="search" placeholder="학생 ID, 이름, 반, 메모 등">
        </div>
      </div>

      <div class="actions" style="margin-top:14px;">
        <button id="btnLoad" type="button" onclick="loadDashboard()">
          조회
        </button>
        <button class="secondary" type="button" onclick="downloadCsv()">
          CSV 다운로드
        </button>
      </div>
    </section>

    <div id="message" class="message" style="display:none;"></div>

    <section class="stats">
      <div class="stat">
        <div class="label">등록 학생 수</div>
        <div id="statTotalStudents" class="value">0</div>
      </div>

      <div class="stat">
        <div class="label">조회 기록 수</div>
        <div id="statTotalRecords" class="value">0</div>
      </div>

      <div class="stat">
        <div class="label">입실 학생 수</div>
        <div id="statUniqueIn" class="value">0</div>
      </div>

      <div class="stat">
        <div class="label">퇴실 학생 수</div>
        <div id="statUniqueOut" class="value">0</div>
      </div>
    </section>

    <section class="card">
      <div id="tableArea">
        <div class="empty">조회 버튼을 눌러 출결 데이터를 불러오세요.</div>
      </div>
    </section>
  </main>

  <script>
    let currentRecords = [];

    document.addEventListener('DOMContentLoaded', () => {
      const today = toDateInputValue(new Date());

      document.getElementById('dateFrom').value = today;
      document.getElementById('dateTo').value = today;

      const savedPin = localStorage.getItem('attendance_admin_pin') || '';
      document.getElementById('adminPin').value = savedPin;

      loadDashboard();
    });

    function loadDashboard() {
      const adminPin = document.getElementById('adminPin').value.trim();
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;
      const q = document.getElementById('q').value.trim();

      localStorage.setItem('attendance_admin_pin', adminPin);

      setMessage('데이터를 불러오는 중입니다...', '');
      document.getElementById('btnLoad').disabled = true;

      google.script.run
        .withSuccessHandler(res => {
          document.getElementById('btnLoad').disabled = false;

          if (!res || !res.ok) {
            const message = res && res.error ? res.error : '조회 실패';
            setMessage(message, 'error');
            renderStats({});
            renderTable([]);
            return;
          }

          currentRecords = res.records || [];

          setMessage('조회가 완료되었습니다.', '');
          renderStats(res.stats || {});
          renderTable(currentRecords);
        })
        .withFailureHandler(err => {
          document.getElementById('btnLoad').disabled = false;
          setMessage('서버 오류: ' + err, 'error');
          renderStats({});
          renderTable([]);
        })
        .getDashboardData({
          adminPin: adminPin,
          dateFrom: dateFrom,
          dateTo: dateTo,
          q: q
        });
    }

    function renderStats(stats) {
      document.getElementById('statTotalStudents').textContent = stats.totalStudents || 0;
      document.getElementById('statTotalRecords').textContent = stats.totalRecords || 0;
      document.getElementById('statUniqueIn').textContent = stats.uniqueIn || 0;
      document.getElementById('statUniqueOut').textContent = stats.uniqueOut || 0;
    }

    function renderTable(records) {
      const area = document.getElementById('tableArea');

      if (!records || records.length === 0) {
        area.innerHTML = '<div class="empty">조회된 출결 기록이 없습니다.</div>';
        return;
      }

      const rows = records.map(record => {
        const statusClass = record.status === 'IN' ? 'in' : 'out';
        const statusText = record.status === 'IN' ? '입실' : '퇴실';

        return `
          <tr>
            <td>${escapeHtml(record.timestamp)}</td>
            <td>${escapeHtml(record.studentId)}</td>
            <td>${escapeHtml(record.studentName)}</td>
            <td>${escapeHtml(record.className)}</td>
            <td>
              <span class="badge ${statusClass}">
                ${statusText}
              </span>
            </td>
            <td>${escapeHtml(record.source)}</td>
            <td>${escapeHtml(record.note)}</td>
            <td>${escapeHtml(record.deviceId)}</td>
            <td>${escapeHtml(record.userEmail)}</td>
          </tr>
        `;
      }).join('');

      area.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>시간</th>
                <th>학생 ID</th>
                <th>이름</th>
                <th>반</th>
                <th>상태</th>
                <th>소스</th>
                <th>메모</th>
                <th>기기 ID</th>
                <th>사용자</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </div>
      `;
    }

    function downloadCsv() {
      if (!currentRecords || currentRecords.length === 0) {
        alert('다운로드할 데이터가 없습니다.');
        return;
      }

      const headers = [
        'timestamp',
        'studentId',
        'studentName',
        'className',
        'status',
        'source',
        'note',
        'deviceId',
        'userEmail'
      ];

      const lines = [];
      lines.push(headers.join(','));

      currentRecords.forEach(record => {
        const line = headers.map(key => csvEscape(record[key] || '')).join(',');
        lines.push(line);
      });

      const csv = '\uFEFF' + lines.join('\n');
      const blob = new Blob([csv], {
        type: 'text/csv;charset=utf-8;'
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');

      const dateFrom = document.getElementById('dateFrom').value || 'all';
      const dateTo = document.getElementById('dateTo').value || 'all';

      a.href = url;
      a.download = `attendance_${dateFrom}_${dateTo}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
    }

    function setMessage(message, type) {
      const el = document.getElementById('message');

      if (!message) {
        el.style.display = 'none';
        el.textContent = '';
        el.className = 'message';
        return;
      }

      el.style.display = 'block';
      el.textContent = message;
      el.className = 'message';

      if (type) {
        el.classList.add(type);
      }
    }

    function toDateInputValue(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');

      return `${yyyy}-${mm}-${dd}`;
    }

    function csvEscape(value) {
      value = String(value || '');

      if (
        value.includes(',') ||
        value.includes('"') ||
        value.includes('\n') ||
        value.includes('\r')
      ) {
        return '"' + value.replaceAll('"', '""') + '"';
      }

      return value;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
