<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서현고등학교 꿈꾸는 글마루 출석관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #81c784; --primary-dark: #558b2f; --bg-color: #f1f8e9; --text-main: #33691e; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text-main); }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 8px 30px rgba(85, 139, 47, 0.08); width: 100%; max-width: 400px; text-align: center; }
        .clock-container { background: #e8f5e9; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #c8e6c9; }
        .date-text { font-size: 1.1em; color: #558b2f; font-weight: 700; }
        .time-text { font-size: 2.4em; font-weight: 900; color: #2e7d32; }
        .login-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; text-align: left; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input[type="text"], input[type="password"] { padding: 15px; font-size: 1em; border: 2px solid #c8e6c9; border-radius: 10px; width: 100%; box-sizing: border-box; }
        .btn { padding: 14px; font-size: 1.05em; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; border: none; height: 55px; margin-top: 10px; }
        .btn-solid { background-color: var(--primary-color); color: white; }
        .btn-outline { background-color: white; border: 2px solid var(--primary-color); color: var(--primary-dark); }
        .btn-danger { background-color: white; border: 2px solid #e57373; color: #c62828; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn-group .btn { flex: 1; }
        #student-list { margin-top: 20px; display: none; background: #fafafa; padding: 20px; border-radius: 10px; font-size: 0.9em; }
        .footer { margin-top: 30px; font-size: 0.85em; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="container" id="login-screen">
        <h1>서현고등학교 꿈꾸는 글마루 출석관리 시스템</h1>
        <div class="login-form">
            <div class="input-group">
                <label>아이디</label>
                <input type="text" id="admin-id" placeholder="admin 또는 감독자 이름">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="admin-pw" placeholder="기본 1234">
            </div>
            <button class="btn btn-solid" onclick="checkLogin()">로그인</button>
        </div>
    </div>

    <div class="container" id="main-screen" style="display: none; max-width: 500px;">
        <div class="clock-container">
            <div id="current-date" class="date-text"></div>
            <div id="current-time" class="time-text"></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-outline" onclick="downloadTemplate()">📥 양식 다운로드</button>
            <button class="btn btn-outline" onclick="downloadExistingRoster()">📋 명단 다운로드</button>
        </div>
        <div class="btn-group">
            <label class="btn btn-outline" for="excel-upload" style="cursor: pointer; display:flex; justify-content:center; align-items:center;">📤 명단 업로드</label>
            <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display:none;">
            <button class="btn btn-danger" id="delete-all-btn" onclick="deleteExistingRoster()">🗑️ 명단 초기화</button>
        </div>
        <div class="btn-group">
            <button class="btn btn-outline" style="border-color:#1976d2; color:#1976d2;" onclick="downloadTeacherQR()">👨‍🏫 감독교사 QR</button>
            <button class="btn btn-solid" id="pdf-btn" disabled onclick="generatePDF()">🖨️ 학생 QR 다운로드</button>
        </div>
        <a href="dashboard.html" class="btn btn-outline" style="background-color: #e8f5e9; border-color: #4caf50;">📊 기간별 통계 및 출석부 인쇄</a>
        <div id="student-list"></div>
    </div>
    <div class="footer">Copyright 2026. 서현고 교감 김봉재 All Rights Reserved.</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzjDSKEEcwfST6HRxOsQdARUOvhdM8VWUeqTetrcoIDV8_IvrTRHJkgJl9BvLuhd78l/exec"; 
        let studentsData = [];

        window.onload = function() {
            if(sessionStorage.getItem('userRole')) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'block';
                applyRoleUI(sessionStorage.getItem('userRole'));
                setInterval(updateClock, 1000); updateClock(); loadExistingStudents();
            }
        };

        function updateClock() {
            const now = new Date(); const d = ['일','월','화','수','목','금','토'];
            document.getElementById('current-date').innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${d[now.getDay()]}요일)`;
            document.getElementById('current-time').innerText = now.toLocaleTimeString('ko-KR', {hour12:true, hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }

        function applyRoleUI(role) {
            const delBtn = document.getElementById('delete-all-btn');
            if(role === 'admin') { delBtn.disabled = false; delBtn.classList.remove('btn-disabled'); }
            else { delBtn.disabled = true; delBtn.classList.add('btn-disabled'); delBtn.innerText = "🚫 관리자전용"; }
        }

        async function checkLogin() {
            const id = document.getElementById('admin-id').value.trim();
            const pw = document.getElementById('admin-pw').value;
            // 💡 단순하게 admin이거나 글자만 입력되어도 1234면 통과
            if(!id || pw !== "1234") return alert("아이디 또는 비밀번호가 틀렸습니다.");
            
            sessionStorage.setItem('userRole', (id === "admin") ? "admin" : "supervisor");
            location.reload(); 
        }

        async function loadExistingStudents() {
            const res = await (await fetch(`${API_URL}?action=getStudents`)).json();
            studentsData = Array.isArray(res) ? res : (res.list || []);
            if(studentsData.length > 0) {
                document.getElementById('student-list').innerHTML = `✅ ${studentsData.length}명 로드 완료 (마지막: ${res.lastUploadTime})`;
                document.getElementById('student-list').style.display = 'block';
                document.getElementById('pdf-btn').disabled = false;
            }
        }

        async function deleteExistingRoster() {
            if(sessionStorage.getItem('userRole') !== 'admin') return alert("권한이 없습니다.");
            if(!confirm("⚠️ 명단만 초기화됩니다. 통계는 유지됩니다.")) return;
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "resetAll" }) }).then(() => location.reload());
        }

        // 나머지 함수(다운로드/업로드/QR생성)는 이전과 동일
        async function downloadTemplate() { ... } // (기존 코드와 동일)
        async function downloadExistingRoster() { ... } // (기존 코드와 동일)
        async function downloadTeacherQR() { ... } // (기존 코드와 동일)
        async function generatePDF() { ... } // (기존 코드와 동일)
    </script>
</body>
</html>
