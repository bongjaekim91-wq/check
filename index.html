<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서현고등학교 꿈꾸는 글마루 출석관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #81c784; --primary-dark: #558b2f; --bg-color: #f1f8e9; --text-main: #33691e; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text-main); }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 8px 30px rgba(85, 139, 47, 0.08); width: 100%; max-width: 500px; text-align: center; }
        .clock-container { background: #e8f5e9; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #c8e6c9; }
        .date-text { font-size: 1.1em; color: #558b2f; font-weight: 700; }
        .time-text { font-size: 2.4em; font-weight: 900; color: #2e7d32; }
        .btn { padding: 14px; font-size: 1.05em; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; height: 55px; transition: 0.2s; }
        .btn-outline { background-color: white; border: 2px solid var(--primary-color); color: var(--primary-dark); }
        .btn-solid { background-color: var(--primary-color); border: none; color: white; }
        .btn-danger { background-color: white; border: 2px solid #e57373; color: #c62828; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn-group .btn, .btn-group label { flex: 1; margin-bottom: 0; }
        input[type="file"] { display: none; }
        #student-list { margin-top: 20px; text-align: center; border-radius: 10px; background: #fafafa; padding: 20px; font-size: 1em; display: none; border: 1px solid #eee; }
        #qr-canvas-container { display: none; }
        .btn-disabled { background-color: #f5f5f5 !important; border-color: #ddd !important; color: #aaa !important; cursor: not-allowed !important; }
        .footer { margin-top: 30px; font-size: 0.85em; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="container" id="login-screen">
        <h1>서현고등학교 꿈꾸는 글마루 출석관리 시스템</h1>
        <div class="login-form">
            <input type="text" id="admin-id" placeholder="아이디 (admin 또는 감독자 이름)">
            <input type="password" id="admin-pw" placeholder="비밀번호 (기본: 1234)">
            <button class="btn btn-solid" onclick="checkLogin()">로그인</button>
        </div>
    </div>
    <div class="container" id="main-screen" style="display: none;">
        <div class="clock-container">
            <div id="current-date" class="date-text"></div>
            <div id="current-time" class="time-text"></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-outline" onclick="downloadTemplate()">📥 기본 양식 다운로드</button>
            <button class="btn btn-outline" onclick="downloadExistingRoster()">📋 기존 출석 명단 다운로드</button>
        </div>
        <div class="btn-group">
            <label class="btn btn-outline" for="excel-upload" style="cursor: pointer;">📤 새로운 출석 명단 업로드</label>
            <input type="file" id="excel-upload" accept=".xlsx, .xls">
            <button class="btn btn-danger" id="delete-all-btn" onclick="deleteExistingRoster()">🗑️ 명단 초기화</button>
        </div>
        <div class="btn-group" style="margin-top: 10px;">
            <button class="btn btn-outline" style="border-color:#1976d2; color:#1976d2;" onclick="downloadTeacherQR()">👨‍🏫 감독교사 로그인 QR</button>
            <button class="btn btn-solid" id="pdf-btn" disabled onclick="generatePDF()">🖨️ 학생 QR 다운로드</button>
        </div>
        <a href="dashboard.html" class="btn btn-outline" style="background-color: #e8f5e9; border-color: #4caf50;">📊 기간별 출결 통계 및 출석부 인쇄</a>
        <div id="student-list"></div>
    </div>
    <div class="footer">Copyright 2026. 서현고 교감 김봉재 All Rights Reserved.</div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzjDSKEEcwfST6HRxOsQdARUOvhdM8VWUeqTetrcoIDV8_IvrTRHJkgJl9BvLuhd78l/exec"; 
        let studentsData = [];
        window.onload = function() {
            if(sessionStorage.getItem('userRole')) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'block';
                applyRoleUI(sessionStorage.getItem('userRole'));
                updateClock(); loadExistingStudents();
            }
        };
        function updateClock() {
            const now = new Date(); const days = ['일', '월', '화', '수', '목', '금', '토'];
            let h = now.getHours(); const ampm = h >= 12 ? '오후' : '오전'; h = h % 12 || 12; 
            document.getElementById('current-date').innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
            document.getElementById('current-time').innerText = `${ampm} ${h}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        }
        setInterval(updateClock, 1000);
        function applyRoleUI(role) {
            const delBtn = document.getElementById('delete-all-btn');
            if(role === 'admin') { delBtn.disabled = false; delBtn.classList.remove('btn-disabled'); }
            else { delBtn.disabled = true; delBtn.classList.add('btn-disabled'); }
        }
        async function checkLogin() {
            const id = document.getElementById('admin-id').value.trim();
            const pw = document.getElementById('admin-pw').value;
            if(!id || pw !== "1234") return alert("아이디/비밀번호 확인");
            const role = (id === "admin") ? "admin" : "supervisor";
            sessionStorage.setItem('userRole', role);
            location.reload();
        }
        async function loadExistingStudents() {
            const res = await (await fetch(`${API_URL}?action=getStudents`)).json();
            studentsData = Array.isArray(res) ? res : (res.list || []);
            if(studentsData.length > 0) {
                renderSuccessMessage("✅ 불러오기 완료", res.lastUploadTime);
                document.getElementById('pdf-btn').disabled = false;
            }
        }
        function renderSuccessMessage(m, t) { document.getElementById('student-list').innerHTML = `<strong>${m}</strong><br>🕒 마지막 업로드: ${t}<br>총 ${studentsData.length}건 세팅 완료`; document.getElementById('student-list').style.display = 'block'; }
        function deleteExistingRoster() {
            if(!confirm("⚠️ 명단만 초기화됩니다. (통계는 유지)")) return;
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "resetAll" }) }).then(() => location.reload());
        }
        function downloadTemplate() {
            const wb = XLSX.utils.book_new();
            ['월','화','수','목','금'].forEach(day => {
                const ws = XLSX.utils.aoa_to_sheet([[`2026 명단(${day}요일)`,null,null,null,null,null,null,null,null,null,null,null,null], [null,null,'날짜','','','','','','','','','',''], [null,null,'감독교사','','','','','','','','','',''], ['학년','학번','성명','요일','1교시','2교시','1교시','2교시','1교시','2교시','1교시','2교시','1교시','2교시']]);
                XLSX.utils.book_append_sheet(wb, ws, day);
            });
            XLSX.writeFile(wb, "출석부_양식.xlsx");
        }
        function downloadExistingRoster() {
            if(studentsData.length === 0) return alert("데이터 없음");
            const wb = XLSX.utils.book_new();
            ['월','화','수','목','금'].forEach(day => {
                const ws_data = [['학년','학번','성명','요일','1교시','2교시']];
                studentsData.filter(s => s.day === day).forEach(s => ws_data.push([s.id.charAt(0), s.id, s.name, s.day, s.p1_exc, s.p2_exc]));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws_data), day);
            });
            XLSX.writeFile(wb, "현재_출석명단.xlsx");
        }
        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                studentsData = [];
                wb.SheetNames.forEach(sn => {
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header: 1});
                    for(let i=3; i<json.length; i++) {
                        if(json[i][1] && json[i][2]) studentsData.push({ id: String(json[i][1]), name: String(json[i][2]), day: sn.replace(/[^월화수목금]/g, ''), p1_exc: json[i][3], p2_exc: json[i][4] });
                    }
                });
                fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "uploadStudents", students: studentsData }) }).then(() => location.reload());
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });
        function downloadTeacherQR() {
            let baseUrl = window.location.href.split('index.html')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4');
            const qrDiv = document.createElement('div');
            new QRCode(qrDiv, { text: `${baseUrl}scan.html`, width: 256, height: 256, colorDark: "#1976d2", correctLevel: QRCode.CorrectLevel.H });
            setTimeout(() => {
                const ctx = document.createElement('canvas').getContext('2d');
                ctx.canvas.width = 350; ctx.canvas.height = 400;
                ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,350,400);
                ctx.fillStyle = "#1976d2"; ctx.font = "bold 24px Noto Sans KR"; ctx.textAlign = "center";
                ctx.fillText("👨‍🏫 감독교사 로그인 QR", 175, 50);
                ctx.drawImage(qrDiv.querySelector('canvas'), 47, 80);
                pdf.addImage(ctx.canvas.toDataURL('image/png'), 'PNG', 45, 30, 120, 120);
                pdf.save('감독교사_전용QR.pdf');
            }, 100);
        }
        async function generatePDF() {
            const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4');
            let baseUrl = window.location.href.split('index.html')[0];
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            const uniqueMap = new Map();
            studentsData.forEach(s => {
                if(uniqueMap.has(s.id)) uniqueMap.get(s.day.includes(s.day) ? null : s).day += ", "+s.day;
                else uniqueMap.set(s.id, { ...s });
            });
            const final = Array.from(uniqueMap.values());
            for(let i=0; i<final.length; i++) {
                const s = final[i];
                const qrDiv = document.createElement('div');
                new QRCode(qrDiv, { text: `${baseUrl}scan.html?id=${s.id}`, width: 256, height: 256, colorDark: "#33691e", correctLevel: QRCode.CorrectLevel.H });
                await new Promise(r => setTimeout(r, 50));
                const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 330;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,256,330);
                ctx.drawImage(qrDiv.querySelector('canvas'), 0, 0);
                ctx.fillStyle = "#33691e"; ctx.textAlign = "center";
                ctx.font = "bold 26px Noto Sans KR"; ctx.fillText(`${s.id} ${s.name}`, 128, 285);
                ctx.font = "bold 20px Noto Sans KR"; ctx.fillText(`(${s.day})`, 128, 315);
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 20 + (i%3)*60, 20 + Math.floor(i/3)*75, 45, 58);
                if((i+1)%9 === 0) pdf.addPage();
            }
            pdf.save('학생_QR명단.pdf');
        }
    </script>
</body>
</html>
