<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꿈꾸는 글마루 - 명단 관리 및 QR 생성기</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 숲속의 편안하고 맑은 느낌을 주는 디자인 (리틀 포레스트 스타일) */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f1f8e9; /* 아주 연한 잔디밭 색상 */
            color: #2e7d32;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.08);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 1.8em;
            margin-bottom: 30px;
            color: #1b5e20;
        }
        .upload-box {
            border: 2px dashed #a5d6a7;
            padding: 40px 20px;
            border-radius: 12px;
            background-color: #fcfdfa;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-box:hover {
            background-color: #e8f5e9;
            border-color: #81c784;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(76, 175, 80, 0.2);
            transition: 0.2s;
            width: 100%;
        }
        .btn:hover { background-color: #43a047; transform: translateY(-2px); }
        .btn:disabled { background-color: #c8e6c9; cursor: not-allowed; transform: none; box-shadow: none; }
        
        #student-list {
            margin-top: 25px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 8px;
            background: #f1f8e9;
            padding: 15px;
            font-size: 0.9em;
            display: none;
        }
        /* QR 코드를 보이지 않는 곳에서 렌더링하기 위한 공간 */
        #qr-canvas-container { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌱 명단 업로드 및 QR 생성</h1>
        
        <label class="upload-box" for="excel-upload">
            <div style="font-size: 3em; margin-bottom: 10px;">📁</div>
            <div style="font-size: 1.1em; font-weight: bold;">엑셀 출석부 파일을 선택하거나 끌어다 놓으세요</div>
            <div style="color: #666; font-size: 0.9em; margin-top: 5px;">(작성하신 템플릿 파일을 올려주세요)</div>
        </label>
        <input type="file" id="excel-upload" accept=".xlsx, .xls">

        <div id="student-list"></div>

        <button class="btn" id="pdf-btn" disabled onclick="generatePDF()">🖨️ QR 코드 PDF 다운로드</button>
    </div>

    <div id="qr-canvas-container"></div>

    <script>
        // 선생님의 Apps Script 웹 앱 주소로 변경해 주셔야 합니다!
        const API_URL = "https://script.google.com/macros/s/AKfycbzjDSKEEcwfST6HRxOsQdARUOvhdM8VWUeqTetrcoIDV8_IvrTRHJkgJl9BvLuhd78l/exec"; 
        let studentsData = [];

        // 1. 엑셀 파일 업로드 및 데이터 읽기
        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                // '명단' 탭의 데이터 가져오기
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});

                studentsData = [];
                let htmlStr = "<strong>성공적으로 읽어들인 명단:</strong><ul>";
                
                // 헤더(1~2행)를 제외하고 3행부터 데이터 추출
                for(let i = 2; i < json.length; i++) {
                    let row = json[i];
                    if (row[1] && row[2]) { // 학번과 성명이 있는 경우만
                        studentsData.push({
                            id: String(row[1]).trim(),
                            name: String(row[2]).trim()
                        });
                        htmlStr += `<li>${row[1]} - ${row[2]}</li>`;
                    }
                }
                htmlStr += "</ul>";
                
                const listDiv = document.getElementById('student-list');
                listDiv.innerHTML = htmlStr;
                listDiv.style.display = 'block';
                
                // 데이터가 있으면 PDF 버튼 활성화
                if(studentsData.length > 0) {
                    document.getElementById('pdf-btn').disabled = false;
                    uploadToGoogleSheet(studentsData); // 구글 시트로 백업
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // 2. 구글 시트로 명단 전송 (1단계에서 만든 Code.gs 연동)
        function uploadToGoogleSheet(students) {
            if(API_URL === "선생님의_웹앱_주소를_여기에_붙여넣으세요") {
                console.log("웹 앱 주소가 입력되지 않아 구글 시트 저장은 건너뜁니다.");
                return;
            }
            
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "uploadStudents", students: students })
            }).then(res => res.json())
              .then(data => console.log("구글 시트 저장 완료:", data));
        }

        // 3. QR코드 생성 및 PDF 다운로드 마법
        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4'); // A4 세로
            const container = document.getElementById('qr-canvas-container');
            container.innerHTML = ''; // 초기화

            const margin = 20;
            const qrSize = 45;
            const xSpacing = 60;
            const ySpacing = 70;
            let xPos = margin;
            let yPos = margin;

            document.getElementById('pdf-btn').innerText = "⏳ PDF 생성 중...";

            for (let i = 0; i < studentsData.length; i++) {
                const student = studentsData[i];
                
                // QR 코드에 삽입될 출석 다이렉트 링크
                const directLink = `${API_URL}?id=${student.id}`;

                // 임시 div를 만들어 QR 렌더링
                const qrDiv = document.createElement('div');
                container.appendChild(qrDiv);
                
                const qrcode = new QRCode(qrDiv, {
                    text: directLink,
                    width: 256,
                    height: 256,
                    colorDark : "#2e7d32", // QR코드 색상도 자연스럽게
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                // QR이 렌더링될 때까지 잠깐 대기
                await new Promise(r => setTimeout(r, 100));
                
                const canvas = qrDiv.querySelector('canvas');
                const imgData = canvas.toDataURL('image/png');

                // PDF에 QR과 텍스트(학번, 이름) 그리기
                pdf.addImage(imgData, 'PNG', xPos, yPos, qrSize, qrSize);
                pdf.setFontSize(12);
                pdf.text(`${student.id} ${student.name}`, xPos + (qrSize/2), yPos + qrSize + 7, {align: 'center'});

                // 위치 계산 (1줄에 3명씩)
                xPos += xSpacing;
                if ((i + 1) % 3 === 0) {
                    xPos = margin;
                    yPos += ySpacing;
                }

                // 페이지가 꽉 차면 새 페이지 추가
                if (yPos > 250) {
                    pdf.addPage();
                    xPos = margin;
                    yPos = margin;
                }
            }

            // PDF 파일 다운로드
            pdf.save('글마루_스마트_출석QR.pdf');
            document.getElementById('pdf-btn').innerText = "🖨️ QR 코드 PDF 다운로드";
        }
    </script>
</body>
</html>
