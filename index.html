<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서현고등학교 꿈꾸는 글마루 출석관리 시스템</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary-color:#81c784; --primary-dark:#558b2f; --bg-color:#f1f8e9; --text-main:#33691e; }
    body { font-family:'Noto Sans KR',sans-serif; background:var(--bg-color); margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; min-height:100vh; color:var(--text-main); }
    .container { background:white; padding:40px; border-radius:20px; box-shadow:0 8px 30px rgba(85,139,47,.08); width:100%; max-width:400px; text-align:center; box-sizing:border-box; }
    h1 { font-size:1.45em; line-height:1.4; }
    .clock-container { background:#e8f5e9; padding:20px; border-radius:15px; margin-bottom:25px; border:1px solid #c8e6c9; }
    .date-text { font-size:1.1em; color:#558b2f; font-weight:700; }
    .time-text { font-size:2.4em; font-weight:900; color:#2e7d32; }
    .notice { background:#fffde7; border:1px solid #fff59d; padding:12px; border-radius:10px; font-size:.92em; color:#795548; margin-bottom:15px; line-height:1.5; }
    .login-form { display:flex; flex-direction:column; gap:15px; margin-top:20px; text-align:left; }
    .input-group { display:flex; flex-direction:column; gap:5px; }
    .input-group label { font-weight:bold; font-size:.9em; color:var(--primary-dark); }
    input[type="text"], input[type="password"] { padding:15px; font-size:1em; border:2px solid #c8e6c9; border-radius:10px; outline:none; width:100%; box-sizing:border-box; }
    .btn { padding:14px; font-size:1.03em; font-weight:bold; border-radius:10px; cursor:pointer; width:100%; border:none; min-height:55px; margin-top:10px; transition:.2s; text-decoration:none; box-sizing:border-box; display:flex; align-items:center; justify-content:center; }
    .btn-solid { background:var(--primary-color); color:white; }
    .btn-outline { background:white; border:2px solid var(--primary-color); color:var(--primary-dark); }
    .btn-danger { background:white; border:2px solid #e57373; color:#c62828; }
    .btn-group { display:flex; gap:10px; margin-bottom:12px; }
    .btn-group .btn { flex:1; margin-top:0; }
    .btn-disabled { background:#f5f5f5!important; border-color:#ddd!important; color:#aaa!important; cursor:not-allowed!important; }
    #student-list { margin-top:15px; padding:12px; border-radius:10px; background:#e8f5e9; display:none; font-weight:bold; }
    .footer { margin-top:30px; font-size:.85em; color:#7f8c8d; text-align:center; }
  </style>
</head>
<body>
  <div class="container" id="login-screen">
    <h1>서현고등학교<br>꿈꾸는 글마루 출석관리 시스템</h1>
    <div class="notice">
      출석 인정 시간<br>
      1교시 18:00~19:40 / 2교시 20:00~21:40
    </div>
    <div class="login-form">
      <div class="input-group">
        <label>아이디</label>
        <input type="text" id="admin-id" placeholder="당일 감독자 이름 또는 admin" autocomplete="off">
      </div>
      <div class="input-group">
        <label>비밀번호</label>
        <input type="password" id="admin-pw" placeholder="비밀번호">
      </div>
      <button class="btn btn-solid" onclick="checkLogin()">로그인</button>
    </div>
  </div>
  <div class="container" id="main-screen" style="display:none; max-width:500px;">
    <div class="clock-container">
      <div id="current-date" class="date-text"></div>
      <div id="current-time" class="time-text"></div>
    </div>
    <div class="notice">
      출석 인정 시간<br>
      1교시 18:00~19:40 / 2교시 20:00~21:40
    </div>
    <div class="btn-group">
      <button class="btn btn-outline" onclick="downloadTemplate()">📥 양식 다운로드</button>
      <button class="btn btn-outline" onclick="downloadExistingRoster()">📋 명단 다운로드</button>
    </div>
    <div class="btn-group">
      <label class="btn btn-outline" for="excel-upload">📤 명단 업로드</label>
      <input type="file" id="excel-upload" accept=".xlsx,.xls,.csv" style="display:none;">
      <button class="btn btn-danger" id="delete-all-btn" onclick="deleteExistingRoster()">🗑️ 명단 초기화</button>
    </div>
    <div class="btn-group">
      <button class="btn btn-outline" style="border-color:#1976d2; color:#1976d2;" onclick="downloadTeacherQR()">👨‍🏫 감독교사 QR</button>
      <button class="btn btn-solid" id="pdf-btn" disabled onclick="generatePDF()">🖨️ 학생 QR 다운로드</button>
    </div>
    <a href="dashboard.html" class="btn btn-outline" style="background:#e8f5e9; border-color:#4caf50;">📊 기간별 통계 및 출석부 인쇄</a>
    <button class="btn btn-outline" onclick="logout()" style="margin-top:10px;">로그아웃</button>
    <div id="student-list"></div>
  </div>
  <div class="footer">Copyright 2026. 서현고 교감 김봉재 All Rights Reserved.</div>
  <script>
    // 새 버전으로 배포한 최신 앱스 스크립트 웹 앱 URL로 반드시 변경해주세요.
    const API_URL = "https://script.google.com/macros/s/AKfycbzjDSKEEcwfST6HRxOsQdARUOvhdM8VWUeqTetrcoIDV8_IvrTRHJkgJl9BvLuhd78l/exec";
    let studentsData = [];
    
    window.onload = function() {
      if (sessionStorage.getItem("userRole")) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-screen").style.display = "block";
        applyRoleUI(sessionStorage.getItem("userRole"));
        setInterval(updateClock, 1000);
        updateClock();
        loadExistingStudents();
      }
    };
    
    function updateClock() {
      const now = new Date();
      const d = ["일","월","화","수","목","금","토"];
      document.getElementById("current-date").innerText =
        `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${d[now.getDay()]}요일)`;
      document.getElementById("current-time").innerText =
        now.toLocaleTimeString("ko-KR", { hour12:true, hour:"2-digit", minute:"2-digit", second:"2-digit" });
    }
    
    function applyRoleUI(role) {
      const delBtn = document.getElementById("delete-all-btn");
      if (role === "admin") {
        delBtn.disabled = false;
        delBtn.classList.remove("btn-disabled");
      } else {
        delBtn.disabled = true;
        delBtn.classList.add("btn-disabled");
        delBtn.innerText = "🚫 관리자전용";
      }
    }
    
    function checkLogin() {
      const id = document.getElementById("admin-id").value.trim();
      const pw = document.getElementById("admin-pw").value.trim();
      if (!id) return alert("아이디(감독자 이름)를 입력해주세요.");
      if (!pw) return alert("비밀번호를 입력해주세요.");
      if (pw !== "1234") return alert("비밀번호가 올바르지 않습니다.");
      const role = id === "admin" ? "admin" : "supervisor";
      sessionStorage.setItem("userRole", role);
      sessionStorage.setItem("teacherName", id);
      location.reload();
    }
    
    function logout() {
      if (!confirm("로그아웃하시겠습니까?")) return;
      sessionStorage.removeItem("userRole");
      sessionStorage.removeItem("teacherName");
      location.reload();
    }
    
    async function loadExistingStudents() {
      try {
        const res = await fetch(`${API_URL}?action=getStudents`);
        const data = await res.json();
        studentsData = Array.isArray(data) ? data : (data.list || []);
        if (studentsData.length > 0) {
          document.getElementById("student-list").innerHTML =
            `✅ ${studentsData.length}건 로드 완료<br><span style="font-size:.9em;">최근 업로드: ${data.lastUploadTime || "기록 없음"}</span>`;
          document.getElementById("student-list").style.display = "block";
          document.getElementById("pdf-btn").disabled = false;
        }
      } catch (e) {
        alert("학생명단을 불러오지 못했습니다.");
      }
    }
    
    async function deleteExistingRoster() {
      if (sessionStorage.getItem("userRole") !== "admin") {
        return alert("관리자 권한이 없습니다.");
      }
      if (!confirm("학생명단만 초기화됩니다. 기존 출결기록은 유지됩니다. 계속하시겠습니까?")) return;
      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "resetRosterOnly" })
      });
      location.reload();
    }
    
    function downloadTemplate() {
      const wb = XLSX.utils.book_new();
      ["월","화","수","목","금"].forEach(day => {
        const rows = [
          ["학번", "성명", "요일", "1교시", "2교시", "생성일", "삭제일"],
          ["10101", "홍길동", day, "", "", "", ""],
          ["10102", "김글마루", day, "", "X", "", ""]
        ];
        const ws = XLSX.utils.aoa_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, day);
      });
      XLSX.writeFile(wb, "출석부_양식(새버전).xlsx");
    }
    
    function downloadExistingRoster() {
      if (studentsData.length === 0) return alert("다운로드할 명단이 없습니다.");
      const wb = XLSX.utils.book_new();
      ["월","화","수","목","금"].forEach(day => {
        const wsData = [["학번","성명","요일","1교시","2교시","생성일","삭제일"]];
        studentsData
          .filter(s => s.day === day)
          .sort((a,b) => String(a.id).localeCompare(String(b.id)))
          .forEach(s => {
            wsData.push([
              s.id,
              s.name,
              s.day,
              s.p1_exc || "",
              s.p2_exc || "",
              "",
              ""
            ]);
          });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsData), day);
      });
      XLSX.writeFile(wb, "현재_출석명단.xlsx");
    }

    // ==========================================
    // 💡 엑셀 업로드 로직 완전 교체 (초강력 스마트 동적 인식 방식)
    // ==========================================
    document.getElementById("excel-upload").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = async function(ev) {
        try {
          const wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
          studentsData = [];
          
          wb.SheetNames.forEach(sn => {
            // 시트 이름에서 요일 추출 (예: "월요일" -> "월")
            const dayMatch = sn.match(/[월화수목금토일]/);
            const dayFromSheet = dayMatch ? dayMatch[0] : "";
            const json = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1 });
            
            // 1. 데이터에서 열(Column) 헤더 위치를 동적으로 찾습니다. (순서가 뒤죽박죽이어도 다 찾아냅니다)
            let idIdx = 0, nameIdx = 1, dayIdx = 2, p1Idx = 3, p2Idx = 4;
            let headerFound = false;
            
            for (let i = 0; i < Math.min(json.length, 10); i++) { // 상위 10줄 내에서 스캔
              const row = json[i];
              if (!row) continue;
              
              let tempId = -1, tempName = -1, tempDay = -1, tempP1 = -1, tempP2 = -1;
              for (let j = 0; j < row.length; j++) {
                const val = String(row[j] || "").replace(/\s+/g, ""); // 공백 제거하고 텍스트만 비교
                if (val.includes("학번")) tempId = j;
                if (val.includes("성명") || val.includes("이름")) tempName = j;
                if (val.includes("요일")) tempDay = j;
                if (val.includes("1교시")) tempP1 = j;
                if (val.includes("2교시")) tempP2 = j;
              }
              
              // 학번과 성명이 모두 있는 줄을 헤더 줄로 확정합니다.
              if (tempId !== -1 && tempName !== -1) {
                idIdx = tempId; 
                nameIdx = tempName;
                if (tempDay !== -1) dayIdx = tempDay;
                if (tempP1 !== -1) p1Idx = tempP1;
                if (tempP2 !== -1) p2Idx = tempP2;
                headerFound = true;
                break;
              }
            }
            
            // 2. 찾아낸 열 위치를 바탕으로 학생 데이터를 추출합니다.
            for (let i = 0; i < json.length; i++) {
              const row = json[i];
              if (!row || row.length < 2) continue; // 빈 줄 무시
              
              const id = String(row[idIdx] || "").trim();
              const name = String(row[nameIdx] || "").trim();
              
              // 헤더 줄이거나 빈 줄이면 건너뜀
              if (id.includes("학번") || name.includes("성명") || name.includes("이름") || !id || !name) continue;
              
              // 학번에 '숫자'가 하나라도 들어있고 이름이 존재하면 무조건 학생으로 인정 (보이지 않는 띄어쓰기 등 무시)
              if (/\d/.test(id) && name) {
                const dayFromRow = String(row[dayIdx] || "").trim();
                const finalDay = dayFromSheet || (dayFromRow.match(/[월화수목금토일]/) ? dayFromRow.match(/[월화수목금토일]/)[0] : "");
                
                const p1Mark = String(row[p1Idx] || "").trim().toUpperCase();
                const p2Mark = String(row[p2Idx] || "").trim().toUpperCase();
                
                if (finalDay) { 
                  studentsData.push({
                    id: id.replace(/[^0-9]/g, ""), // 혹시 모를 특수문자 제거 후 숫자만 학번으로 저장
                    name: name,
                    day: finalDay,
                    p1_exc: (p1Mark === "X" || p1Mark === "O" || p1Mark === "결") ? "X" : "",
                    p2_exc: (p2Mark === "X" || p2Mark === "O" || p2Mark === "결") ? "X" : ""
                  });
                }
              }
            }
          });
          
          if (studentsData.length === 0) {
            alert("업로드할 학생 데이터가 없습니다.\n(원인: 엑셀 파일 내에 '학번', '성명' 열 제목이 없거나 학생 데이터 형식이 맞지 않습니다.)");
            return;
          }
          
          document.getElementById("student-list").style.display = "block";
          document.getElementById("student-list").innerHTML = `⏳ 데이터를 서버로 전송 중입니다... (${studentsData.length}명)`;
          
          await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
              action: "uploadStudents",
              students: studentsData
            })
          });
          
          alert(`${studentsData.length}건의 명단을 업로드했습니다.`);
          location.reload();
        } catch (error) {
          alert("명단 업로드 중 오류가 발생했습니다: " + error.message);
        }
      };
      reader.readAsArrayBuffer(file);
      e.target.value = ''; 
    });
    // ==========================================

    function getBaseUrl() {
      return location.href.substring(0, location.href.lastIndexOf("/") + 1);
    }
    
    function downloadTeacherQR() {
      const baseUrl = getBaseUrl();
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF("p", "mm", "a4");
      const qrDiv = document.createElement("div");
      new QRCode(qrDiv, {
        text: `${baseUrl}scan.html`,
        width: 256,
        height: 256,
        colorDark: "#1976d2",
        correctLevel: QRCode.CorrectLevel.H
      });
      setTimeout(() => {
        const canvas = document.createElement("canvas");
        canvas.width = 350;
        canvas.height = 420;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, 350, 420);
        ctx.fillStyle = "#1976d2";
        ctx.font = "bold 24px Noto Sans KR";
        ctx.textAlign = "center";
        ctx.fillText("감독교사 로그인 QR", 175, 50);
        ctx.drawImage(qrDiv.querySelector("canvas"), 47, 90);
        ctx.font = "bold 14px Noto Sans KR";
        ctx.fillText("1교시 18:00~19:40 / 2교시 20:00~21:40", 175, 380);
        pdf.addImage(canvas.toDataURL("image/png"), "PNG", 45, 25, 120, 145);
        pdf.save("감독교사_전용QR.pdf");
      }, 100);
    }
    
    async function generatePDF() {
      if (studentsData.length === 0) return alert("학생명단이 없습니다.");
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF("p", "mm", "a4");
      const baseUrl = getBaseUrl();
      const uniqueMap = new Map();
      studentsData.forEach(s => {
        if (uniqueMap.has(s.id)) {
          const ex = uniqueMap.get(s.id);
          if (!ex.day.includes(s.day)) ex.day += ", " + s.day;
        } else {
          uniqueMap.set(s.id, { ...s });
        }
      });
      const finalList = Array.from(uniqueMap.values())
        .sort((a,b) => String(a.id).localeCompare(String(b.id)));
      for (let i = 0; i < finalList.length; i++) {
        const s = finalList[i];
        const qrDiv = document.createElement("div");
        new QRCode(qrDiv, {
          text: `${baseUrl}scan.html?id=${encodeURIComponent(s.id)}`,
          width: 256,
          height: 256,
          colorDark: "#33691e",
          correctLevel: QRCode.CorrectLevel.H
        });
        await new Promise(r => setTimeout(r, 40));
        const canvas = document.createElement("canvas");
        canvas.width = 256;
        canvas.height = 340;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, 256, 340);
        ctx.drawImage(qrDiv.querySelector("canvas"), 0, 0);
        ctx.fillStyle = "#33691e";
        ctx.textAlign = "center";
        ctx.font = "bold 25px Noto Sans KR";
        ctx.fillText(`${s.id} ${s.name}`, 128, 285);
        ctx.font = "bold 18px Noto Sans KR";
        ctx.fillText(`(${s.day})`, 128, 315);
        pdf.addImage(
          canvas.toDataURL("image/png"),
          "PNG",
          20 + (i % 3) * 60,
          20 + Math.floor((i % 9) / 3) * 82,
          45,
          60
        );
        if ((i + 1) % 9 === 0 && i < finalList.length - 1) {
          pdf.addPage();
        }
      }
      pdf.save("학생_QR명단.pdf");
    }
  </script>
</body>
</html>
