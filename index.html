<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>출결 관리 시스템</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      margin: 0;
      background: #f8fafc;
      color: #222;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 13px;
      background: #dbeafe;
      color: #1e3a8a;
      font-weight: 700;
    }

    .badge.readonly {
      background: #fef3c7;
      color: #92400e;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .login-card {
      max-width: 420px;
      margin: 60px auto;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input, select, textarea {
      padding: 9px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .filter {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: #2563eb;
      color: white;
      font-size: 14px;
    }

    button.secondary {
      background: #475569;
    }

    button.danger {
      background: #dc2626;
    }

    button.light {
      background: #e2e8f0;
      color: #1e293b;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    nav button {
      background: #e2e8f0;
      color: #1e293b;
    }

    nav button.active {
      background: #2563eb;
      color: white;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .message {
      margin: 12px 0;
      font-weight: 700;
    }

    .message.error {
      color: #b91c1c;
    }

    .message.success {
      color: #047857;
    }

    .message.loading {
      color: #2563eb;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
      background: white;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 7px;
      text-align: center;
    }

    th {
      background: #f1f5f9;
      font-weight: 800;
    }

    td.left {
      text-align: left;
    }

    .section-title {
      margin-top: 28px;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .small {
      color: #64748b;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .grid, .grid-2, .filter {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .grid, .grid-2, .filter {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 14px;
      }
    }

    @media print {
      header,
      nav,
      .no-print,
      .message {
        display: none !important;
      }

      body {
        background: white;
      }

      .container {
        max-width: none;
        padding: 0;
      }

      .card {
        border: none;
        box-shadow: none;
        padding: 0;
      }

      table {
        font-size: 11px;
      }

      th, td {
        padding: 4px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>출결 관리 시스템</h1>
      <div id="modeText" class="small" style="color:#dbeafe;"></div>
    </div>

    <div class="buttons">
      <span id="userBadge" class="badge"></span>
      <button id="logoutBtn" class="danger no-print" onclick="handleLogout()" style="display:none;">로그아웃</button>
    </div>
  </header>

  <div class="container">
    <div id="loginView" class="card login-card" style="display:none;">
      <h2>관리자 / 감독교사 로그인</h2>
      <p class="small">출결 입력 및 관리 기능은 로그인 후 사용할 수 있습니다.</p>

      <div class="grid-2">
        <label>
          아이디
          <input type="text" id="loginId" placeholder="예: admin">
        </label>

        <label>
          비밀번호
          <input type="password" id="loginPassword" placeholder="비밀번호">
        </label>
      </div>

      <div class="buttons" style="margin-top:16px;">
        <button onclick="handleLogin()">로그인</button>
      </div>

      <div id="loginMessage" class="message"></div>
    </div>

    <div id="appView" style="display:none;">
      <nav class="no-print">
        <button id="nav-attendanceInput" class="write-only" onclick="showPage('attendanceInput')">출결 입력</button>
        <button id="nav-periodStats" onclick="showPage('periodStats')">기간별 통계</button>
        <button id="nav-printAttendance" onclick="showPage('printAttendance')">출석부 인쇄</button>
      </nav>

      <div id="globalMessage" class="message"></div>

      <!-- 출결 입력 -->
      <section id="page-attendanceInput" class="page">
        <div class="card">
          <h2>출결 입력</h2>
          <p class="small">관리자 또는 감독교사만 사용할 수 있습니다.</p>

          <div class="grid">
            <label>
              날짜
              <input type="date" id="inputDate">
            </label>

            <label>
              학년
              <input type="text" id="inputGrade" placeholder="예: 1">
            </label>

            <label>
              반
              <input type="text" id="inputClassName" placeholder="예: 3">
            </label>

            <label>
              번호
              <input type="text" id="inputNumber" placeholder="예: 15">
            </label>

            <label>
              이름
              <input type="text" id="inputName" placeholder="학생 이름">
            </label>

            <label>
              출결 상태
              <select id="inputStatus"></select>
            </label>

            <label style="grid-column: span 2;">
              사유
              <input type="text" id="inputReason" placeholder="사유 입력">
            </label>
          </div>

          <div class="buttons" style="margin-top:16px;">
            <button onclick="saveAttendanceFromForm()">저장</button>
            <button class="light" onclick="clearInputForm()">초기화</button>
          </div>
        </div>
      </section>

      <!-- 기간별 통계 -->
      <section id="page-periodStats" class="page">
        <div class="card">
          <h2>기간별 통계</h2>

          <div class="filter no-print">
            <label>
              시작일
              <input type="date" id="statsStart">
            </label>

            <label>
              종료일
              <input type="date" id="statsEnd">
            </label>

            <label>
              학년
              <input type="text" id="statsGrade" placeholder="전체">
            </label>

            <label>
              반
              <input type="text" id="statsClassName" placeholder="전체">
            </label>

            <label>
              이름
              <input type="text" id="statsName" placeholder="전체">
            </label>

            <div class="buttons">
              <button onclick="loadPeriodStats()">조회</button>
            </div>
          </div>

          <h3 class="section-title">전체 통계</h3>
          <div id="totalTable"></div>

          <h3 class="section-title">학생별 기간 통계</h3>
          <div id="studentTable"></div>

          <h3 class="section-title">상세 내역</h3>
          <div id="statsRecordTable"></div>
        </div>
      </section>

      <!-- 출석부 인쇄 -->
      <section id="page-printAttendance" class="page">
        <div class="card">
          <h2>출석부 인쇄</h2>

          <div class="filter no-print">
            <label>
              시작일
              <input type="date" id="printStart">
            </label>

            <label>
              종료일
              <input type="date" id="printEnd">
            </label>

            <label>
              학년
              <input type="text" id="printGrade" placeholder="전체">
            </label>

            <label>
              반
              <input type="text" id="printClassName" placeholder="전체">
            </label>

            <label>
              이름
              <input type="text" id="printName" placeholder="전체">
            </label>

            <div class="buttons">
              <button onclick="loadPrintData()">조회</button>
              <button class="secondary" onclick="window.print()">인쇄</button>
            </div>
          </div>

          <div id="printTitle"></div>
          <div id="printTable"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const READ_ONLY = <?!= READ_ONLY_JSON ?>;
    const INITIAL_PAGE = <?!= INITIAL_PAGE_JSON ?>;

    let TOKEN = localStorage.getItem('ATTENDANCE_TOKEN') || '';
    let CURRENT_USER = null;
    let STATUSES = [];

    document.addEventListener('DOMContentLoaded', async () => {
      setDefaultDates();
      await loadBootstrap();

      if (READ_ONLY) {
        enterReadonlyMode();
        showPage(INITIAL_PAGE || 'periodStats');

        if ((INITIAL_PAGE || 'periodStats') === 'printAttendance') {
          loadPrintData();
        } else {
          loadPeriodStats();
        }

        return;
      }

      if (TOKEN) {
        try {
          const result = await server('validateSession', TOKEN);

          if (result.ok) {
            CURRENT_USER = result.user;
            enterAppMode();
            showPage(INITIAL_PAGE || 'attendanceInput');
            return;
          }
        } catch (err) {
          TOKEN = '';
          localStorage.removeItem('ATTENDANCE_TOKEN');
        }
      }

      showLogin();
    });

    async function loadBootstrap() {
      try {
        const result = await server('getBootstrap');
        STATUSES = result.statuses || [];
        renderStatusOptions();
      } catch (err) {
        showGlobalMessage(err.message, 'error');
      }
    }

    function renderStatusOptions() {
      const select = document.getElementById('inputStatus');
      if (!select) return;

      select.innerHTML = '';

      STATUSES.forEach(status => {
        const option = document.createElement('option');
        option.value = status;
        option.textContent = status;
        select.appendChild(option);
      });
    }

    function showLogin() {
      document.getElementById('loginView').style.display = 'block';
      document.getElementById('appView').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'none';
      document.getElementById('userBadge').textContent = '로그인 필요';
      document.getElementById('modeText').textContent = '관리자/감독교사용 모드';
    }

    function enterAppMode() {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('appView').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'inline-block';

      document.getElementById('userBadge').className = 'badge';
      document.getElementById('userBadge').textContent =
        CURRENT_USER ? `${CURRENT_USER.name} (${CURRENT_USER.role})` : '로그인됨';

      document.getElementById('modeText').textContent = '관리자/감독교사용 모드';
    }

    function enterReadonlyMode() {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('appView').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'none';

      document.getElementById('userBadge').className = 'badge readonly';
      document.getElementById('userBadge').textContent = '조회 전용';

      document.getElementById('modeText').textContent = '일반교사용 조회 전용 모드';

      document.querySelectorAll('.write-only').forEach(el => {
        el.style.display = 'none';
      });
    }

    async function handleLogin() {
      const id = document.getElementById('loginId').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      setLoginMessage('로그인 중입니다...', 'loading');

      try {
        const result = await server('login', { id, password });

        TOKEN = result.token;
        CURRENT_USER = result.user;
        localStorage.setItem('ATTENDANCE_TOKEN', TOKEN);

        setLoginMessage('', '');
        enterAppMode();
        showPage('attendanceInput');
      } catch (err) {
        setLoginMessage(err.message, 'error');
      }
    }

    async function handleLogout() {
      try {
        if (TOKEN) {
          await server('logout', TOKEN);
        }
      } catch (err) {
        console.warn(err);
      }

      TOKEN = '';
      CURRENT_USER = null;
      localStorage.removeItem('ATTENDANCE_TOKEN');
      showLogin();
    }

    function showPage(pageName) {
      if (READ_ONLY && pageName === 'attendanceInput') {
        pageName = 'periodStats';
      }

      document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');
      });

      document.querySelectorAll('nav button').forEach(button => {
        button.classList.remove('active');
      });

      const page = document.getElementById('page-' + pageName);
      const nav = document.getElementById('nav-' + pageName);

      if (page) page.classList.add('active');
      if (nav) nav.classList.add('active');

      clearGlobalMessage();
    }

    async function saveAttendanceFromForm() {
      if (READ_ONLY) {
        showGlobalMessage('조회 전용 모드에서는 저장할 수 없습니다.', 'error');
        return;
      }

      const data = {
        date: document.getElementById('inputDate').value,
        grade: document.getElementById('inputGrade').value.trim(),
        className: document.getElementById('inputClassName').value.trim(),
        number: document.getElementById('inputNumber').value.trim(),
        name: document.getElementById('inputName').value.trim(),
        status: document.getElementById('inputStatus').value,
        reason: document.getElementById('inputReason').value.trim()
      };

      showGlobalMessage('저장 중입니다...', 'loading');

      try {
        const result = await server('saveAttendance', TOKEN, data);
        showGlobalMessage(result.message || '저장되었습니다.', 'success');
        clearInputForm(false);
      } catch (err) {
        showGlobalMessage(err.message, 'error');
      }
    }

    function clearInputForm(clearDate = true) {
      if (clearDate) {
        document.getElementById('inputDate').value = todayString();
      }

      document.getElementById('inputGrade').value = '';
      document.getElementById('inputClassName').value = '';
      document.getElementById('inputNumber').value = '';
      document.getElementById('inputName').value = '';
      document.getElementById('inputReason').value = '';

      if (STATUSES.length > 0) {
        document.getElementById('inputStatus').value = STATUSES[0];
      }
    }

    function getStatsParams() {
      return {
        start: document.getElementById('statsStart').value,
        end: document.getElementById('statsEnd').value,
        grade: document.getElementById('statsGrade').value.trim(),
        className: document.getElementById('statsClassName').value.trim(),
        name: document.getElementById('statsName').value.trim()
      };
    }

    async function loadPeriodStats() {
      showGlobalMessage('조회 중입니다...', 'loading');

      try {
        const params = getStatsParams();

        const result = READ_ONLY
          ? await server('publicGetPeriodStats', params)
          : await server('getPeriodStats', TOKEN, params);

        renderTotals(result);
        renderStudents(result);
        renderStatsRecords(result);

        clearGlobalMessage();
      } catch (err) {
        showGlobalMessage(err.message, 'error');
      }
    }

    function getPrintParams() {
      return {
        start: document.getElementById('printStart').value,
        end: document.getElementById('printEnd').value,
        grade: document.getElementById('printGrade').value.trim(),
        className: document.getElementById('printClassName').value.trim(),
        name: document.getElementById('printName').value.trim()
      };
    }

    async function loadPrintData() {
      showGlobalMessage('출석부 데이터를 조회 중입니다...', 'loading');

      try {
        const params = getPrintParams();

        const result = READ_ONLY
          ? await server('publicGetAttendancePrintData', params)
          : await server('getAttendancePrintData', TOKEN, params);

        renderPrintTitle(params);
        renderPrintTable(result);

        clearGlobalMessage();
      } catch (err) {
        showGlobalMessage(err.message, 'error');
      }
    }

    function renderTotals(data) {
      const statuses = data.statuses || [];
      const totals = data.totals || {};

      let html = '<table>';
      html += '<thead><tr>';
      html += '<th>전체</th>';

      statuses.forEach(status => {
        html += `<th>${escapeHtml(status)}</th>`;
      });

      html += '</tr></thead><tbody><tr>';
      html += `<td>${totals['전체'] || 0}</td>`;

      statuses.forEach(status => {
        html += `<td>${totals[status] || 0}</td>`;
      });

      html += '</tr></tbody></table>';

      document.getElementById('totalTable').innerHTML = html;
    }

    function renderStudents(data) {
      const statuses = data.statuses || [];
      const rows = data.byStudent || [];

      if (!rows.length) {
        document.getElementById('studentTable').innerHTML = '<p class="small">조회 결과가 없습니다.</p>';
        return;
      }

      let html = '<table>';
      html += '<thead><tr>';
      html += '<th>학년</th>';
      html += '<th>반</th>';
      html += '<th>번호</th>';
      html += '<th>이름</th>';
      html += '<th>전체</th>';

      statuses.forEach(status => {
        html += `<th>${escapeHtml(status)}</th>`;
      });

      html += '</tr></thead><tbody>';

      rows.forEach(row => {
        html += '<tr>';
        html += `<td>${escapeHtml(row.grade)}</td>`;
        html += `<td>${escapeHtml(row.className)}</td>`;
        html += `<td>${escapeHtml(row.number)}</td>`;
        html += `<td>${escapeHtml(row.name)}</td>`;
        html += `<td>${row.total || 0}</td>`;

        statuses.forEach(status => {
          html += `<td>${row.counts && row.counts[status] ? row.counts[status] : 0}</td>`;
        });

        html += '</tr>';
      });

      html += '</tbody></table>';

      document.getElementById('studentTable').innerHTML = html;
    }

    function renderStatsRecords(data) {
      const rows = data.records || [];

      document.getElementById('statsRecordTable').innerHTML = makeRecordTable(rows);
    }

    function renderPrintTitle(params) {
      const start = params.start || '';
      const end = params.end || '';
      const grade = params.grade ? `${params.grade}학년` : '전체 학년';
      const className = params.className ? `${params.className}반` : '전체 반';

      document.getElementById('printTitle').innerHTML = `
        <h3 style="text-align:center; margin:24px 0 8px;">출석부</h3>
        <p style="text-align:center; margin:0 0 16px;">
          기간: ${escapeHtml(start)} ~ ${escapeHtml(end)} /
          대상: ${escapeHtml(grade)} ${escapeHtml(className)}
        </p>
      `;
    }

    function renderPrintTable(data) {
      const rows = data.records || [];
      document.getElementById('printTable').innerHTML = makeRecordTable(rows);
    }

    function makeRecordTable(rows) {
      if (!rows.length) {
        return '<p class="small">조회 결과가 없습니다.</p>';
      }

      let html = '<table>';
      html += '<thead><tr>';
      html += '<th>날짜</th>';
      html += '<th>학년</th>';
      html += '<th>반</th>';
      html += '<th>번호</th>';
      html += '<th>이름</th>';
      html += '<th>출결</th>';
      html += '<th>사유</th>';
      html += '</tr></thead><tbody>';

      rows.forEach(row => {
        html += '<tr>';
        html += `<td>${escapeHtml(row.date)}</td>`;
        html += `<td>${escapeHtml(row.grade)}</td>`;
        html += `<td>${escapeHtml(row.className)}</td>`;
        html += `<td>${escapeHtml(row.number)}</td>`;
        html += `<td>${escapeHtml(row.name)}</td>`;
        html += `<td>${escapeHtml(row.status)}</td>`;
        html += `<td class="left">${escapeHtml(row.reason)}</td>`;
        html += '</tr>';
      });

      html += '</tbody></table>';

      return html;
    }

    function setDefaultDates() {
      const today = new Date();
      const before = new Date(today);
      before.setDate(today.getDate() - 30);

      const start = toDateInput(before);
      const end = toDateInput(today);

      document.getElementById('inputDate').value = end;

      document.getElementById('statsStart').value = start;
      document.getElementById('statsEnd').value = end;

      document.getElementById('printStart').value = start;
      document.getElementById('printEnd').value = end;
    }

    function todayString() {
      return toDateInput(new Date());
    }

    function toDateInput(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function showGlobalMessage(message, type) {
      const el = document.getElementById('globalMessage');
      el.textContent = message || '';
      el.className = 'message ' + (type || '');
    }

    function clearGlobalMessage() {
      showGlobalMessage('', '');
    }

    function setLoginMessage(message, type) {
      const el = document.getElementById('loginMessage');
      el.textContent = message || '';
      el.className = 'message ' + (type || '');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function server(functionName, ...args) {
      return new Promise((resolve, reject) => {
        const runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject);

        runner[functionName](...args);
      });
    }
  </script>
</body>
</html>
