<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>Attendance</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --danger: #dc2626;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      letter-spacing: -0.03em;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 32px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      background: #fff;
      transition: 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
    }

    .btn.primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .btn.primary:hover {
      background: var(--primary-dark);
    }

    .info {
      margin-top: 24px;
      padding: 16px;
      border-radius: 14px;
      background: #eff6ff;
      color: #1e40af;
      font-size: 14px;
      line-height: 1.6;
      text-align: left;
    }

    code {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(37, 99, 235, 0.1);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    @media (min-width: 640px) {
      .actions {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>출결 관리</h1>
      <p class="desc">
        QR / 바코드 스캔 또는 학생 ID 입력으로 출결을 기록하고,<br>
        대시보드에서 출결 현황을 확인할 수 있습니다.
      </p>

      <div class="actions">
        <a class="btn primary" href="<?= appUrl ?>?page=scan">
          스캔 출결 시작
        </a>
        <a class="btn" href="<?= appUrl ?>?page=dashboard">
          대시보드 보기
        </a>
      </div>

      <div class="info">
        <strong>초기 설정</strong><br>
        Apps Script 편집기에서 최초 1회 <code>setup()</code> 함수를 실행하세요.<br>
        기본 관리자 PIN은 <code>1234</code>입니다.
      </div>
    </section>
  </main>
</body>
</html>
