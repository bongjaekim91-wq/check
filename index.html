<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꿈꾸는 글마루 출석 관리 시스템</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #81c784;
            --primary-dark: #558b2f;
            --bg-color: #f1f8e9;
            --text-main: #33691e;
            --text-sub: #689f38;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(85, 139, 47, 0.08);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* 서현고등학교 헤더 스타일 */
        .school-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .school-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .school-name {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--primary-dark);
        }

        h1 {
            font-size: 1.6em;
            margin-bottom: 30px;
            color: var(--text-main);
            word-break: keep-all;
        }

        /* 로그인 폼 스타일 */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input[type="text"], input[type="password"] {
            padding: 15px;
            font-size: 1em;
            border: 2px solid #c8e6c9;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--primary-color);
        }

        /* 공통 버튼 스타일 */
        .btn {
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            display: block;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: center;
            text-decoration: none;
        }

        .btn-outline {
            background-color: white;
            border: 2px solid var(--primary-color);
            color: var(--primary-dark);
        }
        .btn-outline:hover { background-color: var(--bg-color); }
        
        .btn-solid {
            background-color: var(--primary-color);
            border: none;
            color: white;
            box-shadow: 0 4px 10px rgba(129, 199, 132, 0.3);
        }
        .btn-solid:hover { background-color: #66bb6a; transform: translateY(-2px); }
        .btn-solid:disabled { background-color: #e0e0e0; box-shadow: none; cursor: not-allowed; transform: none; }

        input[type="file"] { display: none; }

        #student-list {
            margin-top: 20px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            border-radius: 10px;
            background: #fafafa;
            padding: 15px;
            font-size: 0.9em;
            display: none;
            border: 1px solid #eee;
        }
        #qr-canvas-container { display: none; }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <div class="school-header">
            <img src="https://cdn-icons-png.flaticon.com/512/2941/2941582.png" alt="학교 마크" class="school-logo">
            <span class="school-name">서현고등학교</span>
        </div>
        <h1>관리자 로그인</h1>
        
        <div class="login-form">
            <input type="text" id="admin-id" placeholder="아이디를 입력하세요" autocomplete="off">
            <input type="password" id="admin-pw" placeholder="비밀번호를 입력하세요">
            <button class="btn btn-solid" onclick="checkLogin()">로그인</button>
        </div>
    </div>

    <div class="container" id="main-screen" style="display: none;">
        <div class="school-header">
            <img src="https://cdn-icons-png.flaticon.com/512/2941/2941582.png" alt="학교 마크" class="school-logo">
            <span class="school-name">서현고등학교</span>
        </div>
        <h1>꿈꾸는 글마루 출석 관리 시스템</h1>
        
        <button class="btn btn-outline" onclick="downloadTemplate()">📥 출석부 양식 다운로드</button>
        
        <label class="btn btn-outline" for="excel-upload">
            📤 출석부 양식 업로드 (작성된 파일)
        </label>
        <input type="file" id="excel-upload" accept=".xlsx, .xls">
        
        <button class="btn btn-solid" id="pdf-btn" disabled onclick="generatePDF()">🖨️ QR코드 PDF 다운로드</button>
        
        <a href="dashboard.html" class="btn btn-outline" style="background-color: #e8f5e9; border-color: #4caf50;">📊 기간별 출결 통계 및 명단 조회하기</a>

        <div id="student-list"></div>
    </div>

    <div id="qr-canvas-container"></div>

    <script>
        // ==========================================
        // ⚙️ 기본 설정 (선생님의 API 주소 탑재 완료)
        // ==========================================
        const ADMIN_ID = "admin";    // 원하는 아이디로 변경 가능
        const ADMIN_PW = "1234";     // 원하는 비밀번호로 변경 가능
        const API_URL = "https://script.google.com/macros/s/AKfycbzjDSKEEcwfST6HRxOsQdARUOvhdM8VWUeqTetrcoIDV8_IvrTRHJkgJl9BvLuhd78l/exec"; 
        
        let studentsData = [];

        // ==========================================
        // 🔐 로그인 기능
        // ==========================================
        function checkLogin() {
            const id = document.getElementById('admin-id').value;
            const pw = document.getElementById('admin-pw').value;

            if(id === ADMIN_ID && pw === ADMIN_PW) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'block';
            } else {
                alert("아이디 또는 비밀번호가 일치하지 않습니다.");
            }
        }

        document.getElementById('admin-pw').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') checkLogin();
        });

        // ==========================================
        // 📥 출석부 양식 다운로드
        // ==========================================
        function downloadTemplate() {
            const wb = XLSX.utils.book_new();
            const ws_data = [
                ['2026 꿈꾸는 글마루 명단(월요일)', null, null, null, null],
                ['학년', '학번', '성명', '1교시', '2교시'],
                [1, '10101', '홍길동', '☐', '☐'],
                [1, '10102', '김서현', '☐', '☐']
            ];
            
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            ws['!merges'] = [ { s: {r:0, c:0}, e: {r:0, c:4} } ];
            ws['!cols'] = [ {wpx: 50}, {wpx: 80}, {wpx: 100}, {wpx: 60}, {wpx: 60} ];

            XLSX.utils.book_append_sheet(wb, ws, "학생명단");
            XLSX.writeFile(wb, "꿈꾸는글마루_출석부_양식.xlsx");
        }

        // ==========================================
        // 📤 명단 업로드 및 읽기
        // ==========================================
        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});

                studentsData = [];
                let htmlStr = "<strong>✅ 명단 인식 성공:</strong><ul style='margin-top:5px; padding-left:20px;'>";
                
                // 3행(인덱스 2)부터 추출
                for(let i = 2; i < json.length; i++) {
                    let row = json[i];
                    if (row[1] && row[2]) {
                        studentsData.push({
                            id: String(row[1]).trim(),
                            name: String(row[2]).trim()
                        });
                        htmlStr += `<li>${row[1]} ${row[2]}</li>`;
                    }
                }
                htmlStr += "</ul>";
                
                const listDiv = document.getElementById('student-list');
                listDiv.innerHTML = htmlStr;
                listDiv.style.display = 'block';
                
                if(studentsData.length > 0) {
                    document.getElementById('pdf-btn').disabled = false;
                    uploadToGoogleSheet(studentsData);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // 읽어들인 명단을 구글 시트로 전송
        function uploadToGoogleSheet(students) {
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "uploadStudents", students: students })
            }).catch(e => console.log("구글 시트 연동 에러", e));
        }

        // ==========================================
        // 🖨️ QR코드 PDF 다운로드 (한글 폰트 깨짐 완벽 해결 버전)
        // ==========================================
        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const container = document.getElementById('qr-canvas-container');
            container.innerHTML = ''; 

            const margin = 20;
            const qrSize = 45; 
            const xSpacing = 60;
            const ySpacing = 70;
            let xPos = margin;
            let yPos = margin;

            const btn = document.getElementById('pdf-btn');
            btn.innerText = "⏳ PDF 생성 중...";
            btn.disabled = true;

            for (let i = 0; i < studentsData.length; i++) {
                const student = studentsData[i];
                const directLink = `${API_URL}?id=${student.id}`;

                const qrDiv = document.createElement('div');
                container.appendChild(qrDiv);
                
                const qrcode = new QRCode(qrDiv, {
                    text: directLink,
                    width: 256, height: 256,
                    colorDark : "#33691e", colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                await new Promise(r => setTimeout(r, 50)); 
                
                const qrCanvas = qrDiv.querySelector('canvas');
                if(qrCanvas) {
                    const combineCanvas = document.createElement('canvas');
                    const ctx = combineCanvas.getContext('2d');
                    
                    combineCanvas.width = qrCanvas.width;
                    combineCanvas.height = qrCanvas.height + 50; 

                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, combineCanvas.width, combineCanvas.height);
                    ctx.drawImage(qrCanvas, 0, 0);

                    ctx.fillStyle = "#33691e"; 
                    ctx.font = "bold 28px 'Noto Sans KR', sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText(`${student.id} ${student.name}`, combineCanvas.width / 2, combineCanvas.height - 15);

                    const imgData = combineCanvas.toDataURL('image/png');
                    const imgHeight = qrSize * (combineCanvas.height / combineCanvas.width); 
                    
                    pdf.addImage(imgData, 'PNG', xPos, yPos, qrSize, imgHeight);

                    xPos += xSpacing;
                    if ((i + 1) % 3 === 0) { xPos = margin; yPos += ySpacing; }
                    if (yPos > 250 && i < studentsData.length - 1) {
                        pdf.addPage();
                        xPos = margin; yPos = margin;
                    }
                }
            }

            pdf.save('글마루_스마트_출석QR.pdf');
            btn.innerText = "🖨️ QR코드 PDF 다운로드";
            btn.disabled = false;
        }
    </script>
</body>
</html>
