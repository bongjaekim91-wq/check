<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서현고등학교 꿈꾸는 글마루 출석관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; display: flex; flex-direction: column; align-items: center; }
    h1 { color: #2c3e50; font-weight: 900; font-size: 2em; margin-bottom: 5px; text-align: center; }
    h2 { color: #27ae60; font-weight: 700; font-size: 1.2em; margin-bottom: 25px; text-align: center; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 30px; width: 100%; max-width: 600px; margin-bottom: 20px; box-sizing: border-box; text-align: center; }
    .notice { background: #fffde7; border: 1px solid #fff59d; color: #795548; padding: 15px; border-radius: 8px; font-size: 0.95em; line-height: 1.6; margin-bottom: 20px; font-weight: bold; }
    input[type="text"], input[type="password"], input[type="date"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; box-sizing: border-box; text-align: center; }
    .btn { display: inline-block; width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; text-decoration: none; box-sizing: border-box; }
    .btn:hover { background: #219150; }
    .btn-outline { background: white; color: #27ae60; border: 2px solid #27ae60; }
    .btn-outline:hover { background: #e8f5e9; }
    .btn-danger { background: #e74c3c; }
    .btn-danger:hover { background: #c0392b; }
    .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; margin-bottom: 10px; }
    .file-upload-wrapper input[type="file"] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
    .date-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
    #qr-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 20px; }
    .qr-card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; text-align: center; background: #fff; width: 140px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .qr-card img { margin: 0 auto 10px auto; display: block; }
    .qr-card p { margin: 0; font-size: 0.9em; font-weight: bold; color: #333; }
    .footer { margin-top: 20px; color: #7f8c8d; font-size: 0.85em; text-align: center; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>서현고등학교</h1>
  <h2>꿈꾸는 글마루 출석관리 시스템</h2>

  <!-- 로그인 화면 -->
  <div class="card" id="login-screen">
    <div class="notice">
      출석 인정 시간<br>1교시 18:00~19:40 / 2교시 19:41~21:40
    </div>
    <input type="text" id="admin-id" placeholder="아이디">
    <input type="password" id="admin-pw" placeholder="비밀번호">
    <button class="btn" onclick="login()">로그인</button>
  </div>

  <!-- 메인 관리 화면 -->
  <div class="card hidden" id="main-screen">
    <div class="notice">
      출석 인정 시간<br>1교시 18:00~19:40 / 2교시 19:41~21:40
    </div>
    
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <a href="https://docs.google.com/spreadsheets/d/1B0q88z322iN-wF0b5O4D-wL_8_23x0F0E3Z_U809U7s/copy" target="_blank" class="btn btn-outline">📥 양식 다운로드</a>
      <button class="btn btn-outline" onclick="downloadCurrentStudents()">📋 현재 명단 다운</button>
    </div>

    <!-- 💡 업그레이드: 기간 설정 업로드 -->
    <h3 style="margin-top: 20px; color: #2c3e50;">📅 명단 운영 기간 설정</h3>
    <div class="date-row">
      <div style="flex:1; text-align:left;">
        <label style="font-size:0.85em; color:#666; font-weight:bold;">시작일</label>
        <input type="date" id="uploadStartDate">
      </div>
      <div style="flex:1; text-align:left;">
        <label style="font-size:0.85em; color:#666; font-weight:bold;">종료일</label>
        <input type="date" id="uploadEndDate">
      </div>
    </div>
    
    <div class="file-upload-wrapper">
      <button class="btn">📤 명단 엑셀 업로드</button>
      <input type="file" id="excel-file" accept=".xlsx, .xls" onchange="handleFileUpload(event)">
    </div>
    <p id="upload-status" style="color:#27ae60; font-weight:bold; margin-bottom:20px;"></p>

    <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">

    <button class="btn btn-danger" onclick="resetRoster()">🗑️ 학생 명단 초기화 (기간 종료 시)</button>
    
    <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">

    <a href="scan.html" target="_blank" class="btn btn-outline" style="background:#3498db; color:white; border:none;">👨‍🏫 감독교사 스캐너 열기</a>
    <a href="dashboard.html" target="_blank" class="btn btn-outline" style="background:#9b59b6; color:white; border:none;">📊 대시보드(통계/출석부) 열기</a>
    
    <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">

    <!-- 💡 업그레이드: 기준일 지정 QR 코드 생성 -->
    <h3 style="margin-top: 20px; color: #2c3e50;">📷 학생 QR 코드 생성</h3>
    <div style="text-align:left; margin-bottom:10px;">
      <label style="font-size:0.85em; color:#666; font-weight:bold;">조회 기준일 (해당 기간 명단 불러오기)</label>
      <input type="date" id="qrTargetDate">
    </div>
    <button class="btn btn-outline" onclick="loadStudentsForQR()">명단 로드 및 QR 생성</button>
    <button class="btn hidden" id="print-qr-btn" onclick="window.print()">🖨️ 생성된 QR 코드 인쇄</button>
    
    <div id="qr-container"></div>
    
    <button class="btn btn-outline" onclick="logout()" style="margin-top:30px;">로그아웃</button>
  </div>

  <div class="footer">
    Copyright 2026. 서현고 교감 김봉재 All Rights Reserved.
  </div>

  <script>
    // ⚠️ 새 버전으로 배포한 앱스 스크립트 웹 앱 URL로 반드시 변경해주세요!
    const API_URL = "https://script.google.com/macros/s/AKfycbzjDSKEEcwfST6HRxOsQdARUOvhdM8VWUeqTetrcoIDV8_IvrTRHJkgJl9BvLuhd78l/exec";
    
    window.onload = function() {
      // 오늘 날짜 기본 세팅
      const today = new Date();
      const offset = today.getTimezoneOffset() * 60000;
      const localToday = new Date(today.getTime() - offset).toISOString().split('T')[0];
      
      document.getElementById('uploadStartDate').value = localToday;
      document.getElementById('qrTargetDate').value = localToday;

      if(sessionStorage.getItem("adminLogged")) {
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("main-screen").classList.remove("hidden");
      }
    };

    function login() {
      if (document.getElementById("admin-pw").value === "1234") {
        sessionStorage.setItem("adminLogged", "true");
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("main-screen").classList.remove("hidden");
      } else { alert("비밀번호가 틀렸습니다."); }
    }

    function logout() {
      sessionStorage.removeItem("adminLogged");
      location.reload();
    }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const startDate = document.getElementById("uploadStartDate").value;
      const endDate = document.getElementById("uploadEndDate").value;
      
      if (!startDate || !endDate) {
        alert("업로드할 명단의 [시작일]과 [종료일]을 반드시 선택해주세요.");
        event.target.value = '';
        return;
      }
      if (startDate > endDate) {
        alert("시작일이 종료일보다 늦을 수 없습니다.");
        event.target.value = '';
        return;
      }

      const reader = new FileReader();
      document.getElementById("upload-status").innerText = "엑셀 파일 분석 중... ⏳";
      
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(firstSheet);
        
        let students = [];
        jsonData.forEach(row => {
          let id = row["학번"]; let name = row["이름"]; let day = row["요일"];
          if (id && name && day) {
            students.push({
              id: String(id).trim(), name: String(name).trim(), day: String(day).trim(),
              p1_exc: String(row["1교시제외"] || "").trim(), p2_exc: String(row["2교시제외"] || "").trim()
            });
          }
        });
        
        if (students.length === 0) {
          alert("유효한 학생 데이터가 없습니다. 양식을 확인해주세요.");
          document.getElementById("upload-status").innerText = "";
          event.target.value = '';
          return;
        }

        if(!confirm(`총 ${students.length}명의 학생을 [${startDate} ~ ${endDate}] 기간으로 업로드하시겠습니까?`)) {
          document.getElementById("upload-status").innerText = "";
          event.target.value = '';
          return;
        }

        document.getElementById("upload-status").innerText = "서버로 데이터 전송 중... 🚀";
        
        // 💡 업그레이드: 시작일/종료일 데이터를 함께 서버로 전송
        fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ 
            action: "uploadStudents", 
            startDate: startDate, 
            endDate: endDate, 
            students: students 
          })
        })
        .then(res => res.json())
        .then(res => {
          if (res.success) {
            document.getElementById("upload-status").innerText = "✅ 업로드 완료! (기간 설정됨)";
            setTimeout(() => { document.getElementById("upload-status").innerText = ""; }, 3000);
          } else {
            alert("업로드 실패: " + res.message);
            document.getElementById("upload-status").innerText = "❌ 업로드 실패";
          }
          event.target.value = '';
        })
        .catch(err => {
          alert("서버 연결 오류");
          document.getElementById("upload-status").innerText = "❌ 오류 발생";
          event.target.value = '';
        });
      };
      reader.readAsArrayBuffer(file);
    }

    function downloadCurrentStudents() {
      const targetDate = document.getElementById("qrTargetDate").value;
      if(!targetDate) { alert("조회 기준일을 선택해주세요."); return; }
      
      document.getElementById("upload-status").innerText = "명단 다운로드 중... ⏳";
      fetch(`${API_URL}?action=getStudents&date=${targetDate}`)
        .then(res => res.json())
        .then(res => {
          document.getElementById("upload-status").innerText = "";
          if (!res.list || res.list.length === 0) {
            alert("해당 기준일에 등록된 명단이 없습니다.");
            return;
          }
          const wsData = [["학번", "이름", "요일", "1교시제외", "2교시제외"]];
          res.list.forEach(s => { wsData.push([s.id, s.name, s.day, s.p1_exc, s.p2_exc]); });
          const wb = XLSX.utils.book_new();
          const ws = XLSX.utils.aoa_to_sheet(wsData);
          XLSX.utils.book_append_sheet(wb, ws, "학생명단");
          XLSX.writeFile(wb, `글마루명단_${targetDate}기준.xlsx`);
        })
        .catch(() => {
          document.getElementById("upload-status").innerText = "";
          alert("다운로드 중 오류가 발생했습니다.");
        });
    }

    function resetRoster() {
      if(!confirm("⚠️ 경고: 전체 명단이 삭제 처리됩니다.\n정말 초기화하시겠습니까?")) return;
      document.getElementById("upload-status").innerText = "초기화 진행 중... ⏳";
      fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "resetRosterOnly" })
      })
      .then(res => res.json())
      .then(res => {
        alert(res.success ? "명단이 초기화되었습니다." : "실패: " + res.message);
        document.getElementById("upload-status").innerText = "";
      });
    }

    // 💡 업그레이드: 기준일 기반으로 학생 불러오기
    function loadStudentsForQR() {
      const targetDate = document.getElementById("qrTargetDate").value;
      if(!targetDate) { alert("조회 기준일을 선택해주세요."); return; }

      document.getElementById("upload-status").innerText = "학생 데이터 불러오는 중... ⏳";
      fetch(`${API_URL}?action=getStudents&date=${targetDate}`)
        .then(res => res.json())
        .then(res => {
          document.getElementById("upload-status").innerText = "";
          const container = document.getElementById("qr-container");
          container.innerHTML = "";
          if (!res.list || res.list.length === 0) {
            alert(`선택하신 날짜(${targetDate})에 활성화된 학생 데이터가 없습니다.`);
            document.getElementById("print-qr-btn").classList.add("hidden");
            return;
          }
          
          let uniqueStudents = {};
          res.list.forEach(s => { uniqueStudents[s.id] = s.name; });

          Object.keys(uniqueStudents).forEach(id => {
            const card = document.createElement("div");
            card.className = "qr-card";
            const qrDiv = document.createElement("div");
            new QRCode(qrDiv, { text: `https://seohyun.hs.kr?id=${id}`, width: 100, height: 100 });
            const p = document.createElement("p");
            p.innerText = `${uniqueStudents[id]} (${id})`;
            card.appendChild(qrDiv); card.appendChild(p);
            container.appendChild(card);
          });
          document.getElementById("print-qr-btn").classList.remove("hidden");
        })
        .catch(() => {
          document.getElementById("upload-status").innerText = "";
          alert("데이터를 불러오지 못했습니다.");
        });
    }
  </script>
</body>
</html>
