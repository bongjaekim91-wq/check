<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>출결 관리 시스템</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #1e3a8a;
      font-size: 18px;
      font-weight: 700;
      z-index: 10;
    }

    #appFrame {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }

    .spinner {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      border: 3px solid #bfdbfe;
      border-top-color: #1e3a8a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loading">
    <span class="spinner"></span>
    출결 관리 시스템을 불러오는 중입니다...
  </div>

  <iframe
    id="appFrame"
    title="출결 관리 시스템"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <script>
    /*
     * 여기에 본인의 Apps Script 웹앱 주소를 넣으세요.
     * 반드시 /exec 로 끝나는 주소여야 합니다.
     *
     * 예:
     * const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxxxxxxxxxxxxxxxxxxxxxxxx/exec';
     */
    const APPS_SCRIPT_URL = '여기에_Apps_Script_웹앱_exec_주소';

    const currentParams = new URLSearchParams(window.location.search);
    const targetUrl = new URL(APPS_SCRIPT_URL);

    /*
     * GitHub 주소에 붙은 mode, page 등의 파라미터를
     * Apps Script 웹앱으로 그대로 전달합니다.
     *
     * 예:
     * https://bongjaekim91-wq.github.io/check/?mode=readonly
     * ↓
     * https://script.google.com/macros/s/.../exec?mode=readonly
     */
    currentParams.forEach(function(value, key) {
      targetUrl.searchParams.set(key, value);
    });

    const frame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');

    frame.src = targetUrl.toString();

    frame.addEventListener('load', function() {
      loading.style.display = 'none';
    });

    setTimeout(function() {
      loading.innerHTML =
        '화면이 열리지 않으면 Apps Script 웹앱 배포 주소와 권한을 확인하세요.';
    }, 15000);
  </script>
</body>
</html>
