<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서현고등학교 꿈꾸는 글마루 출석관리 시스템</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #81c784; --primary-dark: #558b2f; --bg-color: #f1f8e9; --text-main: #33691e; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main); }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 8px 30px rgba(85, 139, 47, 0.08); width: 100%; max-width: 400px; text-align: center; }
        
        /* 💡 로그인 폼 스타일 개선 */
        .login-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; text-align: left; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-weight: bold; font-size: 0.9em; color: var(--primary-dark); }
        input[type="text"], input[type="password"] { padding: 15px; font-size: 1em; border: 2px solid #c8e6c9; border-radius: 10px; outline: none; width: 100%; box-sizing: border-box; }
        
        .btn { padding: 14px; font-size: 1.05em; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; box-sizing: border-box; text-align: center; display: flex; justify-content: center; align-items: center; height: 55px; transition: 0.2s; border: none; }
        .btn-solid { background-color: var(--primary-color); color: white; margin-top: 10px; }
        .btn-solid:hover { background-color: #66bb6a; }
        
        .footer { margin-top: 30px; font-size: 0.85em; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h1>서현고등학교 꿈꾸는 글마루 출석관리 시스템</h1>
        <div class="login-form">
            <div class="input-group">
                <label>아이디</label>
                <input type="text" id="admin-id" placeholder="admin 또는 감독자 이름" autocomplete="off">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="admin-pw" placeholder="기본 비밀번호 1234">
            </div>
            <button class="btn btn-solid" onclick="checkLogin()">로그인</button>
        </div>
    </div>

    <div class="container" id="main-screen" style="display: none;">
        </div>
    
    <div class="footer">Copyright 2026. 서현고 교감 김봉재 All Rights Reserved.</div>
    
    <script>
        // (기존 스크립트 내용 유지)
        async function checkLogin() {
            const id = document.getElementById('admin-id').value.trim();
            const pw = document.getElementById('admin-pw').value;
            if(!id || pw !== "1234") return alert("아이디/비밀번호를 확인해주세요.");
            sessionStorage.setItem('userRole', (id === "admin") ? "admin" : "supervisor");
            location.reload();
        }
    </script>
</body>
</html>
